{id:130,cat:'Théorie',level:'inter',type:'qcm',
q:'Qu\'est-ce que la p-value en statistiques et comment l\'interpréter ?',
opts:['La probabilité que le résultat soit correct','La probabilité d\'obtenir un résultat au moins aussi extrême si l\'hypothèse nulle était vraie — p < 0.05 est le seuil standard de significativité','La taille de l\'échantillon requise','Le coefficient de corrélation'],
ans:1,
expl:'p < 0.05 : on rejette l\'hypothèse nulle avec 95% de confiance (le résultat est "statistiquement significatif"). p > 0.05 : on ne peut pas rejeter l\'hypothèse nulle. Attention : significatif ≠ important. Un effet peut être statistiquement significatif mais pratiquement négligeable sur de grands échantillons.'},

{id:131,cat:'Théorie',level:'inter',type:'open',
q:'Expliquez la différence entre précision (precision) et rappel (recall) en machine learning. Quand prioriser l\'un sur l\'autre ?',
expl:'Précision = Vrais Positifs / (Vrais Positifs + Faux Positifs)\nLe modèle est-il précis quand il prédit positif ?\n\nRappel = Vrais Positifs / (Vrais Positifs + Faux Négatifs)\nLe modèle détecte-t-il tous les cas positifs ?\n\nTrade-off : améliorer la précision tend à réduire le rappel et vice-versa.\n\nPrioriser la précision : détection de spam (éviter les faux positifs — un vrai email en spam est grave).\nPrioriser le rappel : détection de cancer (éviter les faux négatifs — manquer un cancer est grave).\n\nF1-score = 2 × (précision × rappel) / (précision + rappel) — compromis équilibré.'},

{id:132,cat:'Théorie',level:'inter',type:'qcm',
q:'Qu\'est-ce que le NPS (Net Promoter Score) et comment se calcule-t-il ?',
opts:['Un indicateur financier','Une mesure de la satisfaction client : % Promoteurs (note 9-10) - % Détracteurs (note 0-6) sur une question "recommanderiez-vous ?"','Un taux de conversion','Un indicateur de performance opérationnelle'],
ans:1,
expl:'NPS = % Promoteurs (9-10) - % Détracteurs (0-6). Les Passifs (7-8) ne sont pas comptés. Score entre -100 et +100. > 50 est excellent. Avantage : simple et comparable. Limite : ne dit pas pourquoi. À combiner avec des questions ouvertes pour comprendre les causes.'},

{id:133,cat:'Théorie',level:'inter',type:'qcm',
q:'Qu\'est-ce que le principe de "privacy by design" dans le contexte du RGPD ?',
opts:['Un outil de chiffrement','Intégrer la protection des données personnelles dès la conception d\'un système, plutôt qu\'en ajout ultérieur','Un type de base de données sécurisée','Un processus de certification'],
ans:1,
expl:'Privacy by Design : 7 principes fondamentaux dont proactif (anticiper les risques), vie privée par défaut (paramètres les plus restrictifs par défaut), intégré dans la conception (pas ajouté après). Pour un Data Analyst : minimiser la collecte, anonymiser dès que possible, ne pas exposer les données personnelles brutes dans les rapports.'},

{id:134,cat:'Théorie',level:'advanced',type:'open',
q:'Qu\'est-ce que l\'architecture Lambda et l\'architecture Kappa ? Quand utiliser chacune ?',
expl:'Architecture Lambda : deux couches parallèles.\n- Batch layer : traitement de tout l\'historique périodiquement (précis mais lent)\n- Speed layer : traitement des données récentes en temps réel (rapide mais approximatif)\n- Serving layer : combine les deux pour répondre aux requêtes\nProblème : complexité de maintenir deux codebases.\n\nArchitecture Kappa : une seule couche de streaming (Kafka, Flink). Les données historiques sont rejouées comme un stream si nécessaire. Plus simple mais nécessite un système de streaming robuste.\n\nChoix : Lambda pour les organisations avec des besoins batch importants et temps réel. Kappa pour les organisations cloud-native avec streaming mature. Tendance actuelle : vers Kappa ou des architectures lakehouse hybrides.'},

{id:135,cat:'Théorie',level:'advanced',type:'qcm',
q:'Qu\'est-ce que le concept de "observabilité" (observability) des données ?',
opts:['Un outil de visualisation','La capacité à comprendre l\'état de santé de ses données à tout moment : fraîcheur, volume, qualité, schéma, lignage — pour détecter proactivement les incidents','Un type de monitoring réseau','Un processus de gouvernance'],
ans:1,
expl:'Data Observability (Monte Carlo, Great Expectations) surveille en continu : Fraîcheur (les données sont-elles à jour ?), Volume (le nombre de lignes est-il normal ?), Qualité (les valeurs sont dans les plages attendues ?), Schéma (les colonnes n\'ont pas changé ?), Lignage (l\'impact d\'un changement en amont). Essentiel pour les data teams à grande échelle.'},

{id:136,cat:'Théorie',level:'advanced',type:'open',
q:'Expliquez le concept de "semantic layer" et son rôle dans une architecture data moderne.',
expl:'Le semantic layer (couche sémantique) est une abstraction entre les données brutes et les utilisateurs finaux. Il traduit les concepts techniques en termes métier compréhensibles.\n\nExemples d\'outils : dbt Metrics, LookML (Looker), Cube.dev, AtScale.\n\nCe qu\'il apporte :\n- Définitions communes des métriques (le CA est calculé de la même façon partout)\n- Gouvernance centralisée (modifier une définition se propage partout)\n- Self-service BI sécurisé (les utilisateurs ne voient que ce qu\'ils peuvent voir)\n- Cohérence entre outils (Power BI, Tableau, notebooks Python utilisent les mêmes métriques)\n\nProblème résolu : sans semantic layer, chaque rapport calcule le CA différemment → incohérences → perte de confiance dans les données.'},

{id:137,cat:'Théorie',level:'advanced',type:'qcm',
q:'Qu\'est-ce que le principe SOLID appliqué au code de data engineering ?',
opts:['Un framework de sécurité','5 principes de conception logicielle : Single responsibility, Open/closed, Liskov substitution, Interface segregation, Dependency inversion — applicables aux pipelines de données','Un outil ETL','Un standard de qualité des données'],
ans:1,
expl:'Applied to data : S = chaque fonction/pipeline a une seule responsabilité (ingestion ≠ transformation ≠ chargement). O = les pipelines sont extensibles sans modifier le code existant. D = les dépendances sont injectées (connexions BDD, chemins fichiers) plutôt que codées en dur. Ces principes rendent les pipelines testables, maintenables et évolutifs.'},

{id:138,cat:'Théorie',level:'advanced',type:'open',
q:'Qu\'est-ce que le "feature engineering" et pourquoi est-il critique en machine learning ?',
expl:'Le feature engineering est le processus de création, transformation et sélection de variables (features) à partir des données brutes pour améliorer les performances d\'un modèle ML.\n\nTechniques courantes :\n- Encodage : OneHotEncoder, target encoding pour les catégories\n- Normalisation/standardisation : StandardScaler, MinMaxScaler\n- Création de features : âge calculé depuis la date de naissance, interactions entre variables\n- Réduction de dimension : PCA, sélection de features (SelectKBest)\n- Traitement des dates : extraction jour/mois/semaine/heure, is_weekend, jours_depuis_événement\n\nPourquoi critique : "Better data beats better algorithms" (Andrew Ng). Un bon feature engineering avec un algorithme simple surpasse souvent un algorithme complexe avec des données brutes.'},

{id:139,cat:'Théorie',level:'advanced',type:'qcm',
q:'Qu\'est-ce que le concept de "data contract" dans les architectures data modernes ?',
opts:['Un contrat légal sur les données','Un accord formel entre producteurs et consommateurs de données définissant le schéma, la qualité, la fraîcheur et les SLA attendus — prévient les breaking changes non communiqués','Un type de licence de données','Un outil de chiffrement'],
ans:1,
expl:'Un data contract spécifie : schéma (colonnes, types, nullable), qualité (taux de NULL max, valeurs attendues), fraîcheur (SLA de mise à jour), sémantique (définition métier). Si le producteur veut changer le schéma, il doit négocier avec les consommateurs. Implémentations : YAML + CI/CD, Great Expectations, Soda. Essentiel dans les architectures data mesh.'},

{id:140,cat:'Théorie',level:'advanced',type:'open',
q:'Expliquez les différences entre les métriques vanité et les métriques actionnables. Donnez des exemples.',
expl:'Métriques vanité : donnent l\'impression de succès mais n\'aident pas à prendre des décisions. Elles sont souvent impressionnantes en valeur absolue mais non contextualisées.\nEx : nombre total de visiteurs, nombre de téléchargements, nombre de followers.\n\nMétriques actionnables : directement liées à des décisions, contextualisées, permettent de comprendre cause à effet.\nEx : taux de conversion par canal (actionnable : investir dans le canal X), revenu par utilisateur actif (actionnable : optimiser l\'onboarding), taux de rétention à J+30 (actionnable : améliorer les emails J+7).\n\nRègle : une bonne métrique répond à la question "Si ce chiffre change, sais-je exactement quoi faire ?" Si non, c\'est probablement une métrique vanité.\n\nFrameworks utiles : OKR (Objectives & Key Results), North Star Metric, AARRR (Acquisition, Activation, Rétention, Référence, Revenue).'},

{id:141,cat:'Théorie',level:'advanced',type:'qcm',
q:'Qu\'est-ce que le concept de "data democratization" et ses défis ?',
opts:['Rendre les données publiques','Donner accès aux données et outils d\'analyse à tous les collaborateurs de l\'organisation, pas seulement aux équipes techniques — avec les défis de gouvernance et de qualité que cela implique','Un type de base de données open source','Un processus de migration'],
ans:1,
expl:'Data democratization = self-service BI pour tous. Bénéfices : décisions basées sur les données à tous les niveaux, réduction de la dépendance aux équipes data. Défis : qualité (les utilisateurs voient des données brutes mal comprises), gouvernance (qui a accès à quoi ?), shadow IT (chacun crée ses propres rapports contradictoires), formation (les utilisateurs doivent comprendre les limites des données). Solution : semantic layer + gouvernance forte + formation.'},

{id:142,cat:'Théorie',level:'advanced',type:'open',
q:'Qu\'est-ce que le "data storytelling" et pourquoi est-il une compétence clé pour un Data Analyst ?',
expl:'Le data storytelling est l\'art de communiquer des insights de données de façon claire, engageante et convaincante pour une audience non technique.\n\n3 composantes :\n1. Les données : analyses rigoureuses, chiffres vérifiés\n2. La narration : contexte, cause à effet, implications\n3. La visualisation : graphiques clairs, hiérarchie visuelle\n\nPourquoi critique : un insight non communiqué = un insight inutile. Les décideurs prennent des décisions basées sur des histoires, pas des tableaux Excel.\n\nBonnes pratiques :\n- Commencer par la conclusion (pyramid principle)\n- Adapter le niveau de détail à l\'audience\n- Utiliser le bon type de graphique selon le message\n- Éviter le chartjunk (éléments décoratifs sans valeur)\n- Une slide = une idée\n\nOutils : Power BI, Tableau, Flourish, Datawrapper.'},

{id:143,cat:'Théorie',level:'advanced',type:'qcm',
q:'Qu\'est-ce que le principe de "data minimization" et pourquoi est-il important ?',
opts:['Compresser les données','Ne collecter et conserver que les données strictement nécessaires à la finalité déclarée — principe fondamental du RGPD et bonne pratique de gouvernance','Supprimer les doublons','Réduire la taille des fichiers'],
ans:1,
expl:'Data minimization : collecter le minimum nécessaire, conserver le minimum de temps, accorder le minimum d\'accès. Avantages : conformité RGPD, réduction des risques en cas de breach, coûts de stockage réduits, modèles de données plus simples. En pratique : purge automatique des données expirées, anonymisation après X mois, colonnes sensibles masquées selon le profil utilisateur.'},

{id:144,cat:'Théorie',level:'advanced',type:'open',
q:'Expliquez comment vous aborderiez l\'analyse d\'une anomalie : une chute soudaine de 30% du CA un mardi.',
expl:'Approche structurée d\'investigation :\n\n1. Qualifier l\'anomalie\n- Vérifier la source des données (problème de pipeline ?)\n- Confirmer sur plusieurs systèmes\n- Vérifier les dates (décalage de reporting ?)\n\n2. Isoler la dimension affectée\n- Par canal (web, mobile, magasin ?)\n- Par géographie\n- Par catégorie de produit\n- Par segment client\n- Par heure de la journée\n\n3. Chercher les causes externes\n- Incident technique (site down, paiement KO ?)\n- Action concurrente\n- Événement externe (météo, actualité ?)\n- Campagne marketing stoppée ?\n\n4. Corréler avec d\'autres métriques\n- Trafic en baisse aussi ? → problème acquisition\n- Trafic normal, conversion en baisse ? → problème site/offre\n- Panier moyen en baisse ? → problème pricing/promo\n\n5. Communiquer\n- Hypothèse principale + niveau de confiance\n- Actions recommandées\n- Suivi à J+1, J+7'}

,

{id:145,cat:'Théorie',level:'inter',type:'qcm',
q:'Qu\'est-ce que le taux de conversion et comment l\'améliorer ?',
opts:['Le taux de croissance du CA','Le pourcentage de visiteurs qui réalisent l\'action souhaitée — s\'améliore via l\'optimisation du tunnel et l\'A/B testing','Le taux de satisfaction client','Le ratio nouveaux/anciens clients'],
ans:1,
expl:'Taux de conversion = (Conversions / Visiteurs) × 100. Ex : 1000 visiteurs, 30 achats = 3%. Leviers : UX, vitesse, preuve sociale, personnalisation. L\'A/B test est l\'outil clé pour valider chaque amélioration.'},

{id:146,cat:'Théorie',level:'basic',type:'qcm',
q:'Qu\'est-ce qu\'un entrepôt de données (data warehouse) ?',

// ══════════════════════════════════════════
// STATE
// ══════════════════════════════════════════
let F={cat:'all',level:'all',type:'all',status:'all'};
let answered={};
let qcmScore=0, qcmAnswered=0;

const LS_KEY='dataprep_v1';

function saveState(){
  try{localStorage.setItem(LS_KEY,JSON.stringify({answered,qcmScore,qcmAnswered}));}catch(e){}
}

function loadState(){
  try{
    const raw=localStorage.getItem(LS_KEY);
    if(!raw)return;
    const s=JSON.parse(raw);
    if(s.answered)answered=s.answered;
    if(typeof s.qcmScore==='number')qcmScore=s.qcmScore;
    if(typeof s.qcmAnswered==='number')qcmAnswered=s.qcmAnswered;
    document.getElementById('scorePill').innerHTML=`QCM : <strong>${qcmScore} / ${qcmAnswered}</strong>`;
  }catch(e){}
}

function showResetConfirm(){
  document.getElementById('resetConfirm').style.display='block';
  document.addEventListener('click', outsideResetClick);
}
function outsideResetClick(e){
  const wrap=document.getElementById('resetWrap');
  if(!wrap.contains(e.target)){cancelReset();}
}
function cancelReset(){
  document.getElementById('resetConfirm').style.display='none';
  document.removeEventListener('click', outsideResetClick);
}
function confirmReset(){
  answered={};qcmScore=0;qcmAnswered=0;
  saveState();
  document.getElementById('scorePill').innerHTML='QCM : <strong>0 / 0</strong>';
  cancelReset();
  updateTabProgress();
  render();
}

function getFiltered(){
  return Q.filter(q=>{
    if(F.cat!=='all'&&q.cat!==F.cat)return false;
    if(F.level!=='all'&&q.level!==F.level)return false;
    if(F.type!=='all'&&q.type!==F.type)return false;
    const st=answered[q.id];
    if(F.status==='unanswered'&&st!==undefined)return false;
    if(F.status==='correct'&&(!st||st.correct!==true))return false;
    if(F.status==='wrong'&&(!st||st.correct!==false))return false;
    return true;
  });
}

function setF(dim,val,el){
  F[dim]=val;
  const scope=dim==='cat'?'#catTabs .tab':`.filter-btn[onclick*="'${dim}'"]`;
  document.querySelectorAll(scope).forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  render();
}

// ══════════════════════════════════════════
// RENDER
// ══════════════════════════════════════════
function render(){
  const list=document.getElementById('qList');
  const filtered=getFiltered();
  list.innerHTML='';

  if(!filtered.length){
    list.innerHTML='<div class="empty"><div class="empty-icon">∅</div><p>Aucune question pour ces filtres.</p></div>';
    updateStats(filtered);return;
  }

  filtered.forEach((q,i)=>{
    const card=document.createElement('div');
    card.className='q-card'+(answered[q.id]?' answered-card':'');
    card.style.animationDelay=Math.min(i*0.025,0.35)+'s';

    const lvlC={basic:'b-basic',inter:'b-inter',advanced:'b-adv'}[q.level];
    const lvlL={basic:'Basique',inter:'Intermédiaire',advanced:'Avancé'}[q.level];
    const typL={qcm:'QCM',code:'Code',open:'Ouverte'}[q.type];
    const st=answered[q.id];
    const doneTag=st?`<span class="badge b-done" style="margin-left:auto">${st.correct===true?'✓':st.correct===false?'✗':'✓'}</span>`:'<span class="q-num">#'+String(q.id).padStart(2,'0')+'</span>';

    // Table preview
    const tpHtml=q.tables?tablePreview(q.tables):'';

    let body='';
    if(q.type==='qcm'){
      const opts=q.opts.map((o,i)=>{
        let cls='opt';
        if(st!==undefined){cls+=' disabled';if(i===q.ans)cls+=' correct';else if(st.chosen===i)cls+=' wrong';}
        return`<div class="${cls}" onclick="answerQCM(${q.id},${i})"><span class="opt-l">${['A','B','C','D'][i]}</span>${o}</div>`;
      }).join('');
      const fb=st?( st.correct?'<span class="feedback fb-ok">✓ Bonne réponse</span>':'<span class="feedback fb-ko">✗ Mauvaise réponse</span>' ):'';
      body=`<p class="q-text">${q.q}</p>${tpHtml}<div class="options">${opts}</div><div class="btn-row">${fb}</div>
        <div class="expl ${st?'show':''}" id="expl-${q.id}"><div class="expl-lbl">Explication</div><div class="expl-txt">${q.expl}</div></div>
        ${ficheHTML(q.id)}`; 
    }
    if(q.type==='code'){
      body=`<p class="q-text">${q.q}</p>${tpHtml}
        <textarea class="code-input" id="code-${q.id}" placeholder="-- Écris ta requête ici..."></textarea>
        <div class="btn-row"><button class="btn btn-dark" onclick="reveal(${q.id})">Voir la correction</button><button class="btn btn-out" onclick="clearTA('code-${q.id}')">Effacer</button></div>
        <div class="expl ${st?'show':''}" id="expl-${q.id}"><div class="expl-lbl">Correction</div><code class="expl-code">${q.code}</code><div class="expl-txt" style="margin-top:8px">${q.expl}</div></div>
        ${ficheHTML(q.id)}`; 
    }
    if(q.type==='open'){
      body=`<p class="q-text">${q.q}</p>${tpHtml}
        <textarea class="open-input" id="open-${q.id}" placeholder="Écris ta réponse ici..."></textarea>
        <div class="btn-row"><button class="btn btn-dark" onclick="reveal(${q.id})">Voir les éléments de réponse</button></div>
        <div class="expl ${st?'show':''}" id="expl-${q.id}"><div class="expl-lbl">Éléments de réponse</div><div class="expl-txt">${q.expl.replace(/\n/g,'<br>')}</div></div>
        ${ficheHTML(q.id)}`; 
    }

    card.innerHTML=`
      <div class="q-meta">
        <span class="badge ${lvlC}">${lvlL}</span>
        <span class="badge b-cat">${q.cat}</span>
        <span class="badge b-type">${typL}</span>
        ${doneTag}
      </div>
      <div class="q-body">${body}</div>`;
    list.appendChild(card);
  });
  updateStats(filtered);
}

function answerQCM(qid,chosen){
  if(answered[qid]!==undefined)return;
  const q=Q.find(x=>x.id===qid);
  const correct=chosen===q.ans;
  answered[qid]={type:'qcm',correct,chosen};
  if(correct)qcmScore++;
  qcmAnswered++;
  saveState();
  document.getElementById('scorePill').innerHTML=`QCM : <strong>${qcmScore} / ${qcmAnswered}</strong>`;
  updateTabProgress();
  render();
}

function reveal(qid){
  if(!answered[qid])answered[qid]={type:'other',correct:null};
  saveState();
  const el=document.getElementById('expl-'+qid);
  if(el)el.classList.add('show');
  updateTabProgress();
  updateStats(getFiltered());
}

function clearTA(id){const el=document.getElementById(id);if(el)el.value='';}

function updateTabProgress(){
  const cats=['all','SQL','DAX','Modélisation','Python','Théorie'];
  cats.forEach(cat=>{
    const qs=cat==='all'?Q:Q.filter(q=>q.cat===cat);
    const done=qs.filter(q=>answered[q.id]!==undefined).length;
    const el=document.getElementById('tp-'+cat);
    if(el)el.textContent=`${done}/${qs.length}`;
  });
}

function updateStats(filtered){
  const total=filtered.length;
  const done=filtered.filter(q=>answered[q.id]!==undefined).length;
  const pct=total?Math.round(done/total*100):0;
  document.getElementById('sTotal').textContent=total;
  document.getElementById('sAnswered').textContent=done;
  document.getElementById('sScore').textContent=qcmAnswered?`${qcmScore}/${qcmAnswered}`:'—';
  document.getElementById('sPct').textContent=pct+'%';
  document.getElementById('progFill').style.width=pct+'%';
  document.getElementById('progL').textContent=`${done} / ${total} répondu${done>1?'s':''}`;
  document.getElementById('progR').textContent=pct+'%';
}


function ficheHTML(qid){
  const f=FICHES[qid];
  if(!f)return'';
  const tagsHtml=f.tags.map(t=>`<span class="fiche-tag">${t}</span>`).join('');
  return`<button class="fiche-btn" onclick="toggleFiche(${qid},this)">📖 Fiche de révision</button>
  <div class="fiche" id="fiche-${qid}">
    <div class="fiche-header" onclick="toggleFiche(${qid},this.previousElementSibling)">
      <span class="fiche-title">📖 ${f.t}</span>
      <span style="font-size:12px;color:var(--blue);opacity:0.6">✕</span>
    </div>
    <div class="fiche-body">
      <div class="fiche-section">
        <div class="fiche-section-label">Concept clé</div>
        <div class="fiche-section-content">${f.c}</div>
      </div>
      <div class="fiche-section">
        <div class="fiche-section-label">Exemple</div>
        <code class="fiche-code">${f.e}</code>
      </div>
      ${f.w?`<div class="fiche-warning">⚠️ Erreur fréquente : ${f.w}</div>`:''}
      ${f.tip?`<div class="fiche-tip">💡 ${f.tip}</div>`:''}
      <div class="fiche-tags">${tagsHtml}</div>
    </div>
  </div>`;
}

function toggleFiche(qid,btn){
  const el=document.getElementById('fiche-'+qid);
  if(!el)return;
  const isOpen=el.classList.contains('show');
  el.classList.toggle('show');
  if(btn&&btn.classList.contains('fiche-btn')){
    btn.textContent=isOpen?'📖 Fiche de révision':'✕ Fermer la fiche';
  }
}

loadState();
updateTabProgress();
render();
</script>
</body>
</html>
