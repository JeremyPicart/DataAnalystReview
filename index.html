141:{t:'Data Democratization',c:'Accès aux données pour tous les collaborateurs. Bénéfices + défis de gouvernance.',e:'Self-service BI :\n→ Power BI, Tableau, Metabase\n\nDéfis :\n→ Qualité (données mal comprises)\n→ Shadow IT (rapports divergents)\n→ Gouvernance (qui voit quoi ?)',w:'Accès aux données brutes sans formation ni gouvernance — chaos.',tip:'Self-service sur un semantic layer maîtrisé. Pas d\'accès direct aux tables brutes.',tags:['Théorie','BI']},
142:{t:'Data Storytelling',c:'Données + Narration + Visualisation pour des audiences non techniques.',e:'Pyramid Principle :\n→ Conclusion en premier\n→ Arguments\n→ Détails\n\n"CA -15% mars\n → Segment PME\n → Fin promo Q1\n → Action : campagne réactivation"',w:'Analyse chronologique (comment on y est arrivé) — le décideur veut le résultat.',tip:'Une slide = une idée. Conclusion en titre, pas "Analyse des ventes Q1".',tags:['Théorie','Communication']},
143:{t:'Data Minimization',c:'Collecter uniquement les données nécessaires à la finalité. Principe RGPD.',e:'Questions à se poser :\n→ Code postal vs adresse complète ?\n→ Âge calculé vs date de naissance ?\n→ Anonymiser après X mois ?\n→ Qui a vraiment besoin de ces données ?',w:'Collecter "au cas où" sans finalité définie — viole le RGPD.',tip:'Moins de données = moins de risques, moins de coûts, modèles plus simples.',tags:['Théorie','RGPD']},
144:{t:'Analyser une anomalie',c:'Approche structurée : qualifier → isoler → causes externes → corréler → communiquer.',e:'CA -30% mardi :\n1. Bug pipeline ?\n2. Isoler : canal, géo, produit, segment\n3. Site KO ? Paiement KO ?\n4. Trafic ok + conversion baisse → problème site\n5. Hypothèse + niveau confiance + actions',w:'Sauter aux conclusions sans isoler la dimension impactée.',tip:'30% des "anomalies" sont des bugs de pipeline. Vérifier la source en premier.',tags:['Théorie','Analyse','Méthodologie']},
145:{t:'Taux de conversion',c:'% de visiteurs réalisant l\'action souhaitée. Optimisé via UX, A/B testing, personnalisation.',e:'Conversion = Achats / Visiteurs × 100\n\nBenchmarks :\n→ E-commerce : 1-4%\n→ SaaS trial : 5-10%\n\nLeviers :\n→ UX, preuve sociale, urgence, personnalisation',w:'Comparer des taux de conversion de canaux différents sans contexte.',tip:'Segmenter par source, device, segment client pour identifier les leviers.',tags:['Théorie','Métriques']},
146:{t:'Data Warehouse — Définition',c:'Système centralisé pour stocker et analyser des données historiques. Orienté sujet, intégré, non volatile.',e:'Caractéristiques :\n→ Orienté sujet (ventes, clients)\n→ Intégré (toutes les sources)\n→ Non volatile (historique conservé)\n→ Variant dans le temps\n\nExemples : Snowflake, BigQuery, Redshift',w:'Analyses lourdes directement sur la base OLTP de production.',tip:'DW pour les analyses. Base opérationnelle pour les transactions.',tags:['Théorie','Architecture']},
147:{t:'AVERAGE() en DAX',c:'Moyenne arithmétique en ignorant les NULL. AVERAGEX() pour les moyennes pondérées.',e:'Prix Moyen = AVERAGE(dim_produit[prix])\n\n-- Moyenne pondérée\nPrix Moyen Pondéré =\nDIVIDE(\n    SUMX(ventes, ventes[qte] *\n         RELATED(produits[prix])),\n    SUM(ventes[qte])\n)',w:'AVERAGE() pour une moyenne pondérée — donne la moyenne simple des prix.',tip:'AVERAGE() = simple. Pondérée → SUMX / SUM.',tags:['DAX','Mesures']},
148:{t:'Récence client — DATEDIFF',c:'DATEDIFF(début, fin, intervalle) calcule la différence temporelle. La récence (R du RFM) = jours depuis le dernier achat.',e:'Récence =\nVAR d =\n    CALCULATE(\n        MAX(ventes[date]),\n        ALLEXCEPT(ventes, clients[id_client])\n    )\nRETURN DATEDIFF(d, TODAY(), DAY)',w:'ALLEXCEPT manquant — calcule la dernière date dans le contexte filtré.',tip:'Combiner Récence + Fréquence + Montant pour un tableau de bord RFM.',tags:['DAX','Time Intelligence']},
149:{t:'Modèle RFM',c:'Récence + Fréquence + Montant. Score 1-5 par dimension. Segments actionnables.',e:'Champions (5-5-5) : VIP → programme fidélité\nÀ risque (2-4-4) : baisse récence → réactivation\nPerdus (1-1-1) : inactifs → win-back ou abandon',w:'RFM sur toute la base sans segmenter par produit ou géographie.',tip:'Le modèle de segmentation le plus simple et le plus actionnable. Toujours commencer par là.',tags:['Théorie','RFM','Segmentation']},
150:{t:'Shift Left — Qualité des données',c:'Détecter les problèmes de qualité le plus tôt possible. 10x moins coûteux à corriger en amont.',e:'Avec shift left :\nSource → [Tests dbt] → DW → [Tests] → Dashboard\n\nSans : l\'erreur est découverte par l\'utilisateur final',w:'Contrôler la qualité uniquement en bout de pipeline.',tip:'dbt tests + Great Expectations. Commencer par unicité et non-null.',tags:['Théorie','Qualité','dbt']}
};

function tableHTML(name){
  const t=TABLES[name];
  if(!t)return'';
  let h=`<table class="preview-table"><thead><tr>`;
  t.cols.forEach(c=>h+=`<th>${c}</th>`);
  h+=`</tr></thead><tbody>`;
  t.rows.forEach(r=>{h+=`<tr>`;r.forEach(c=>h+=`<td>${c}</td>`);h+=`</tr>`;});
  h+=`</tbody></table>`;
  return h;
}

function toggleTable(btn){
  btn.classList.toggle('open');
  btn.nextElementSibling.classList.toggle('show');
  btn.querySelector('.arrow').textContent=btn.classList.contains('open')?'▼':'▶';
}

function tablePreview(tables){
  if(!tables||!tables.length)return'';
  const labels=tables.map(t=>`<span style="font-weight:500">${t}</span>`).join(', ');
  let html=`<div class="table-preview">
    <div class="table-toggle" onclick="toggleTable(this)">
      <span class="arrow">▶</span> Aperçu des tables : ${labels}
    </div>
    <div class="table-wrap">`;
  tables.forEach(t=>{
    html+=`<div style="padding:8px 0 4px 10px;font-size:10px;font-family:'DM Mono',monospace;color:var(--ink3);text-transform:uppercase;letter-spacing:0.5px;border-bottom:1px solid var(--line)">Table : ${t}</div>${tableHTML(t)}`;
  });
  html+=`</div></div>`;
  return html;
}

const Q=[
// ─── SQL BASIQUE ───
{id:1,cat:'SQL',level:'basic',type:'qcm',tables:['commandes'],
q:'Quelle clause filtre les résultats APRÈS une agrégation GROUP BY ?',
opts:['WHERE','HAVING','FILTER','DISTINCT'],ans:1,
expl:'WHERE filtre avant l\'agrégation. HAVING filtre après. Ex : GROUP BY id_client HAVING SUM(montant) > 1000.'},

{id:2,cat:'SQL',level:'basic',type:'qcm',tables:['commandes','clients'],
q:'Quelle est la différence entre INNER JOIN et LEFT JOIN ?',
opts:['Aucune différence','INNER JOIN retourne uniquement les lignes correspondantes dans les deux tables','LEFT JOIN retourne uniquement la table de droite','INNER JOIN est toujours plus lent'],
ans:1,expl:'INNER JOIN = intersection stricte. LEFT JOIN = toutes les lignes de gauche + correspondances droite (NULL si absent). Utilise LEFT JOIN pour garder les clients sans commandes.'},

{id:3,cat:'SQL',level:'basic',type:'qcm',
q:'Que retourne COUNT(*) vs COUNT(colonne) ?',
opts:['Identique dans tous les cas','COUNT(*) compte toutes les lignes, COUNT(col) ignore les NULL','COUNT(col) compte toutes les lignes','COUNT(*) ignore les doublons'],
ans:1,expl:'COUNT(*) = toutes les lignes y compris celles avec NULL. COUNT(colonne) = ignore les NULL de cette colonne. COUNT(DISTINCT col) = valeurs uniques non nulles.'},

{id:4,cat:'SQL',level:'basic',type:'qcm',
q:'Quel mot-clé supprime les doublons dans un SELECT ?',
opts:['UNIQUE','FILTER','DISTINCT','REMOVE'],ans:2,
expl:'SELECT DISTINCT col1, col2 retourne les combinaisons uniques. S\'applique à toutes les colonnes du SELECT simultanément. Attention : coûteux sur de grands volumes.'},

{id:5,cat:'SQL',level:'basic',type:'code',tables:['commandes'],
q:'Retourne le montant total des commandes par client, uniquement pour les commandes au statut "payée", triées par total décroissant.',
code:`SELECT
    id_client,
    SUM(montant) AS montant_total
FROM commandes
WHERE statut = 'payée'
GROUP BY id_client
ORDER BY montant_total DESC`,
expl:'WHERE filtre avant GROUP BY — seules les lignes statut=payée sont agrégées. ORDER BY sur l\'alias est possible dans ce contexte.'},

{id:6,cat:'SQL',level:'basic',type:'qcm',tables:['commandes'],
q:'Quelle est la différence entre TRUNCATE et DELETE ?',
opts:['Synonymes','DELETE peut filtrer avec WHERE et est loggué ligne par ligne. TRUNCATE vide tout et est plus rapide','TRUNCATE garde les logs de transaction','DELETE ne peut pas être annulé'],
ans:1,expl:'DELETE FROM table WHERE... supprime des lignes filtrées, peut être rollback. TRUNCATE vide la table entière instantanément (pas de log ligne par ligne), difficile à annuler selon le SGBD.'},

{id:7,cat:'SQL',level:'basic',type:'qcm',
q:'Que fait le mot-clé NULL en SQL ? Quelle est la bonne façon de tester une valeur NULL ?',
opts:['NULL = 0 en SQL','NULL = valeur inconnue. On teste avec IS NULL / IS NOT NULL, jamais avec = NULL','NULL = chaîne vide','NULL s\'utilise avec = NULL'],
ans:1,expl:'NULL signifie "valeur inconnue". NULL = NULL retourne NULL (pas TRUE). On utilise toujours IS NULL ou IS NOT NULL. COALESCE(col, valeur_defaut) remplace les NULL.'},

{id:8,cat:'SQL',level:'basic',type:'code',tables:['clients','commandes'],
q:'Retourne la liste de tous les clients avec le nombre de leurs commandes, y compris ceux qui n\'ont aucune commande.',
code:`SELECT
    c.id_client,
    c.nom,
    COUNT(o.id_commande) AS nb_commandes
FROM clients c
LEFT JOIN commandes o ON o.id_client = c.id_client
GROUP BY c.id_client, c.nom
ORDER BY nb_commandes DESC`,
expl:'LEFT JOIN est essentiel ici — il conserve les clients sans commandes (COUNT = 0). Avec INNER JOIN, ils disparaîtraient du résultat.'},

// ─── SQL INTERMEDIAIRE ───
{id:9,cat:'SQL',level:'inter',type:'qcm',tables:['commandes'],
q:'À quoi sert ROW_NUMBER() OVER (PARTITION BY id_client ORDER BY date_commande DESC) ?',
opts:['Compte le nombre de clients','Numérote les lignes par client, triées par date décroissante','Retourne la dernière commande de tous les clients','Classe les clients par montant'],
ans:1,expl:'ROW_NUMBER() attribue 1, 2, 3... à chaque ligne dans une partition. Très utile pour extraire la dernière commande de chaque client avec WHERE rn = 1 dans une sous-requête ou CTE.'},

{id:10,cat:'SQL',level:'inter',type:'qcm',
q:'Quelle est la différence entre UNION et UNION ALL ?',
opts:['Aucune différence','UNION supprime les doublons (coûteux). UNION ALL conserve tout et est plus rapide','UNION ALL est plus lent','UNION fonctionne uniquement avec des tables identiques'],
ans:1,expl:'UNION effectue une déduplication (opération coûteuse). UNION ALL empile sans déduplication. Utilise UNION ALL par défaut sauf besoin explicite de déduplication.'},

{id:11,cat:'SQL',level:'inter',type:'code',tables:['employes','departements'],
q:'Avec un CTE, retourne par département : nombre d\'employés et budget moyen par employé. Filtre les départements avec plus de 3 employés.',
code:`WITH dept_stats AS (
    SELECT
        d.id_departement,
        d.nom_departement,
        d.budget,
        COUNT(e.id_employe) AS nb_employes
    FROM departements d
    INNER JOIN employes e ON e.id_departement = d.id_departement
    GROUP BY d.id_departement, d.nom_departement, d.budget
    HAVING COUNT(e.id_employe) > 3
)
SELECT
    nom_departement,
    nb_employes,
    ROUND(budget / nb_employes, 2) AS budget_par_employe
FROM dept_stats
ORDER BY budget_par_employe DESC`,
expl:'Le CTE améliore la lisibilité et peut être réutilisé. HAVING dans le CTE réduit les données en amont. Le calcul budget/nb_employes se fait dans la requête finale.'},

{id:12,cat:'SQL',level:'inter',type:'qcm',
q:'Dans quel ordre logique SQL exécute-t-il une requête SELECT ?',
opts:['SELECT → FROM → WHERE → GROUP BY → HAVING → ORDER BY','FROM → JOIN → WHERE → GROUP BY → HAVING → SELECT → ORDER BY → LIMIT','WHERE → FROM → SELECT → GROUP BY → ORDER BY','FROM → SELECT → WHERE → HAVING → ORDER BY'],
ans:1,expl:'Ordre d\'exécution logique : FROM/JOIN → WHERE → GROUP BY → HAVING → SELECT → DISTINCT → ORDER BY → LIMIT. C\'est pourquoi on ne peut pas utiliser un alias du SELECT dans le WHERE (il n\'existe pas encore).'},

{id:13,cat:'SQL',level:'inter',type:'code',tables:['commandes'],
q:'Retourne les 3 clients ayant le plus dépensé avec leur total de commandes payées.',
code:`SELECT
    id_client,
    SUM(montant) AS total_depense
FROM commandes
WHERE statut = 'payée'
GROUP BY id_client
ORDER BY total_depense DESC
LIMIT 3`,
expl:'ORDER BY ... DESC + LIMIT N est la syntaxe standard. Sur SQL Server : SELECT TOP 3. Sur Oracle : FETCH FIRST 3 ROWS ONLY.'},

{id:14,cat:'SQL',level:'inter',type:'qcm',tables:['transactions'],
q:'Quelle window function utilises-tu pour accéder à la valeur de la ligne précédente dans une fenêtre ordonnée ?',
opts:['PREV()','LAG()','BEFORE()','SHIFT()'],ans:1,
expl:'LAG(col, n, default) retourne la valeur de n lignes en arrière (1 par défaut). LEAD(col, n) retourne la valeur de n lignes en avant. Très utile pour des calculs de variation sans auto-jointure.'},

{id:15,cat:'SQL',level:'inter',type:'code',tables:['commandes'],
q:'Pour chaque client, retourne sa commande la plus récente uniquement (1 ligne par client).',
code:`WITH ranked AS (
    SELECT
        *,
        ROW_NUMBER() OVER (
            PARTITION BY id_client
            ORDER BY date_commande DESC
        ) AS rn
    FROM commandes
)
SELECT id_client, id_commande, montant, date_commande
FROM ranked
WHERE rn = 1`,
expl:'Le CTE + ROW_NUMBER() est le pattern classique pour "1 ligne par groupe selon un critère". PARTITION BY définit le groupe, ORDER BY définit le tri, WHERE rn = 1 garde le premier.'},

{id:16,cat:'SQL',level:'inter',type:'qcm',tables:['ventes','produits'],
q:'Quelle est la différence entre une sous-requête corrélée et une sous-requête non corrélée ?',
opts:['Aucune différence','La sous-requête corrélée référence la requête externe et est exécutée pour chaque ligne. La non-corrélée est indépendante et exécutée une seule fois','La sous-requête corrélée est toujours plus performante','Une sous-requête corrélée ne peut pas utiliser WHERE'],
ans:1,expl:'Non-corrélée : SELECT * FROM t WHERE id IN (SELECT id FROM autre) — exécutée une fois. Corrélée : SELECT * FROM t WHERE montant > (SELECT AVG(montant) FROM t2 WHERE t2.cat = t.cat) — exécutée pour chaque ligne. Les CTE sont souvent préférables aux sous-requêtes corrélées.'},

// ─── SQL AVANCÉ ───
{id:17,cat:'SQL',level:'advanced',type:'code',tables:['transactions'],
q:'Retourne pour chaque client et chaque transaction le montant cumulé au fil du temps.',
code:`SELECT
    id_client,
    id_transaction,
    montant,
    date_transaction,
    SUM(montant) OVER (
        PARTITION BY id_client
        ORDER BY date_transaction ASC
        ROWS BETWEEN UNBOUNDED PRECEDING AND CURRENT ROW
    ) AS montant_cumule
FROM transactions
ORDER BY id_client, date_transaction`,
expl:'SUM() OVER est une window function. PARTITION BY id_client repart de 0 pour chaque client. ROWS BETWEEN UNBOUNDED PRECEDING AND CURRENT ROW précise la fenêtre glissante cumulée.'},

{id:18,cat:'SQL',level:'advanced',type:'qcm',tables:['ventes'],
q:'Qu\'est-ce qu\'un index et quand peut-il nuire aux performances ?',
opts:['Un index accélère toujours sans inconvénient','Un index accélère les lectures (SELECT) mais ralentit les écritures (INSERT/UPDATE/DELETE) et occupe de l\'espace disque','Un index est utile uniquement sur les clés primaires','Un index remplace le HAVING'],
ans:1,expl:'Un index = structure auxiliaire qui accélère les recherches. Mais chaque écriture doit aussi mettre à jour l\'index. Trop d\'index ralentit les écritures. À utiliser sur les colonnes fréquemment filtrées, jointes ou triées.'},

{id:19,cat:'SQL',level:'advanced',type:'code',tables:['ventes','produits'],
q:'Retourne pour chaque produit son CA et sa part en % du CA total, en une seule requête.',
code:`SELECT
    id_produit,
    SUM(quantite * prix_unitaire) AS ca_produit,
    ROUND(
        SUM(quantite * prix_unitaire) * 100.0
        / SUM(SUM(quantite * prix_unitaire)) OVER (),
        2
    ) AS pct_ca_total
FROM ventes
GROUP BY id_produit
ORDER BY ca_produit DESC`,
expl:'SUM(SUM(...)) OVER () est une window function sur l\'agrégat. Le OVER() vide = fenêtre sur toute la table. Pas besoin de sous-requête ni de CTE séparé.'},

{id:20,cat:'SQL',level:'advanced',type:'qcm',tables:['transactions'],
q:'Qu\'est-ce que le principe de "SARGability" en SQL ?',
opts:['Un type de jointure','La capacité d\'une condition WHERE à utiliser un index efficacement — éviter les fonctions sur les colonnes indexées','Un niveau de transaction','Un type d\'agrégation'],
ans:1,expl:'SARGable (Search ARGument able) = une condition peut utiliser un index. Non-SARGable : WHERE YEAR(date) = 2024 (fonction sur la colonne). SARGable : WHERE date >= \'2024-01-01\' AND date < \'2025-01-01\'. Les fonctions sur colonnes indexées empêchent l\'utilisation de l\'index.'},

{id:21,cat:'SQL',level:'advanced',type:'code',tables:['commandes','clients'],
q:'Trouve les clients qui ont passé des commandes chaque mois pendant les 3 derniers mois (fidélité consécutive).',
code:`WITH monthly AS (
    SELECT
        id_client,
        DATE_TRUNC('month', date_commande) AS mois
    FROM commandes
    WHERE date_commande >= DATE_TRUNC('month', CURRENT_DATE) - INTERVAL '3 months'
    GROUP BY id_client, DATE_TRUNC('month', date_commande)
),
client_months AS (
    SELECT id_client, COUNT(DISTINCT mois) AS nb_mois
    FROM monthly
    GROUP BY id_client
)
SELECT c.id_client, c.nom
FROM client_months cm
JOIN clients c ON c.id_client = cm.id_client
WHERE cm.nb_mois = 3`,
expl:'DATE_TRUNC tronque la date au mois. On compte les mois distincts par client sur la période. Si nb_mois = 3, le client a commandé les 3 derniers mois. Adapter DATE_TRUNC selon le SGBD (MySQL : DATE_FORMAT).'},

// ─── DAX BASIQUE ───
{id:22,cat:'DAX',level:'basic',type:'qcm',
q:'Quelle est la différence entre une mesure et une colonne calculée en DAX ?',
opts:['Aucune différence','La mesure est calculée dynamiquement selon le contexte de filtre. La colonne est calculée au refresh et stockée en mémoire','La colonne calculée est toujours plus performante','Une mesure ne peut pas utiliser CALCULATE'],
ans:1,expl:'Colonne calculée : évaluée ligne par ligne au refresh, stockée dans le modèle. Mesure : calculée à la demande selon le contexte de filtre actif. Préférer les mesures pour les agrégations, les colonnes pour les attributs fixes.'},

{id:23,cat:'DAX',level:'basic',type:'qcm',
q:'Que fait DIVIDE(num, denom, 0) par rapport à l\'opérateur / ?',
opts:['Identique','DIVIDE gère la division par zéro en retournant la valeur par défaut (0 ou BLANK())','DIVIDE est plus lent','/ est préféré en DAX'],
ans:1,expl:'L\'opérateur / génère une erreur ou INFINITY si diviseur = 0. DIVIDE(num, denom, alt) retourne alt si le dénominateur est nul. Toujours préférer DIVIDE dans les mesures.'},

{id:24,cat:'DAX',level:'basic',type:'code',
q:'Écris les deux mesures fondamentales : CA Total et CA de l\'année précédente.',
code:`CA Total = SUM(fact_ventes[montant])

CA Last Year =
CALCULATE(
    [CA Total],
    SAMEPERIODLASTYEAR(dim_date[date])
)`,
expl:'SAMEPERIODLASTYEAR est une fonction Time Intelligence. Prérequis : dim_date doit être marquée "Table de dates" dans Power BI et avoir une colonne date continue sans trous.'},

{id:25,cat:'DAX',level:'basic',type:'qcm',
q:'Qu\'est-ce que BLANK() en DAX et quand l\'utiliser ?',
opts:['Synonyme de 0','Valeur vide/nulle DAX — préférable à 0 quand l\'absence de données doit être distinguée d\'une valeur nulle réelle','Synonyme de NULL SQL','BLANK() provoque une erreur dans les calculs'],
ans:1,expl:'BLANK() représente l\'absence de valeur. BLANK() + 0 = 0, BLANK() * n = BLANK(). Dans les mesures, retourner BLANK() plutôt que 0 évite d\'afficher des lignes vides dans les visuels.'},

// ─── DAX INTERMEDIAIRE ───
{id:26,cat:'DAX',level:'inter',type:'qcm',
q:'Que fait ALL(dim_produit) dans un CALCULATE ?',
opts:['Filtre tous les produits','Supprime tous les filtres actifs sur la table dim_produit','Retourne la somme de tous les produits','Crée une nouvelle table'],
ans:1,expl:'ALL() supprime le contexte de filtre d\'une table ou colonne. Essentiel pour calculer des % : le dénominateur ignore le filtre du visuel pour retourner le total global.'},

{id:27,cat:'DAX',level:'inter',type:'code',
q:'Calcule la part du CA de chaque produit en % du CA total, indépendamment des filtres actifs.',
code:`CA % Total =
DIVIDE(
    [CA Total],
    CALCULATE([CA Total], ALL(dim_produit))
)`,
expl:'Numérateur : CA avec le filtre produit actif (du visuel). Dénominateur : CA ignorant le filtre produit grâce à ALL(). DIVIDE gère la division par zéro.'},

{id:28,cat:'DAX',level:'inter',type:'qcm',
q:'Qu\'est-ce que ALLEXCEPT() et en quoi diffère-t-il de ALL() ?',
opts:['Synonymes','ALLEXCEPT(table, col1) supprime tous les filtres SAUF ceux des colonnes listées','ALLEXCEPT filtre une seule colonne','ALLEXCEPT est plus lent que ALL'],
ans:1,expl:'ALL(table) supprime tous les filtres sur la table. ALLEXCEPT(table, col1, col2) supprime tous les filtres SAUF ceux des colonnes listées. Utile pour des parts conservant un filtre date par exemple.'},

{id:29,cat:'DAX',level:'inter',type:'code',
q:'Écris une mesure de croissance du CA vs année précédente en %, avec gestion propre du cas sans données N-1.',
code:`Croissance CA % =
VAR ca_n = [CA Total]
VAR ca_n1 = [CA Last Year]
RETURN
DIVIDE(
    ca_n - ca_n1,
    ca_n1,
    BLANK()
)`,
expl:'L\'usage de VAR améliore la lisibilité et les performances (chaque mesure est calculée une seule fois). BLANK() est préférable à 0 : évite d\'afficher 0% quand N-1 n\'existe pas.'},

{id:30,cat:'DAX',level:'inter',type:'qcm',
q:'Pourquoi utiliser VAR dans une mesure DAX ?',
opts:['VAR est obligatoire en DAX','VAR améliore la lisibilité et les performances — chaque expression n\'est calculée qu\'une seule fois','VAR remplace CALCULATE','VAR fonctionne uniquement dans les colonnes calculées'],
ans:1,expl:'VAR stocke le résultat d\'une expression pour le réutiliser sans la recalculer. Améliore la lisibilité et évite les calculs redondants. Pattern : VAR x = expr RETURN calcul_utilisant_x.'},

{id:31,cat:'DAX',level:'inter',type:'code',
q:'Écris une mesure de CA cumulé depuis le début de l\'année (YTD), avec variante pour une clôture fiscale au 30 juin.',
code:`CA YTD =
CALCULATE(
    [CA Total],
    DATESYTD(dim_date[date])
)

-- Variante clôture fiscale au 30 juin
CA YTD Fiscal =
CALCULATE(
    [CA Total],
    DATESYTD(dim_date[date], "06/30")
)`,
expl:'DATESYTD retourne toutes les dates du début de l\'année jusqu\'à la date courante dans le contexte. Le 2ème argument optionnel définit la date de clôture fiscale.'},

// ─── DAX AVANCÉ ───
{id:32,cat:'DAX',level:'advanced',type:'qcm',
q:'Qu\'est-ce que le contexte de filtre vs le contexte de ligne en DAX ?',
opts:['Synonymes','Le contexte de filtre vient des visuels/slicers. Le contexte de ligne itère ligne par ligne (colonnes calculées, SUMX...)','Le contexte de ligne est créé par CALCULATE','Le contexte de filtre ne s\'applique qu\'aux mesures'],
ans:1,expl:'Contexte de filtre : créé par visuels, slicers, filtres — définit quelles lignes sont visibles. Contexte de ligne : itère sur chaque ligne (colonnes calculées, fonctions X). CALCULATE convertit le contexte de ligne en contexte de filtre.'},

{id:33,cat:'DAX',level:'advanced',type:'code',
q:'Écris une mesure qui calcule le CA des 3 derniers mois glissants par rapport à la date courante dans le contexte.',
code:`CA 3 Mois Glissants =
CALCULATE(
    [CA Total],
    DATESINPERIOD(
        dim_date[date],
        LASTDATE(dim_date[date]),
        -3,
        MONTH
    )
)`,
expl:'DATESINPERIOD(colonne_date, date_départ, nb_intervalles, intervalle) retourne une table de dates. LASTDATE() retourne la dernière date dans le contexte actuel. -3 MONTH = 3 mois en arrière.'},

{id:34,cat:'DAX',level:'advanced',type:'qcm',
q:'Pourquoi SUMX est-il parfois préférable à SUM ?',
opts:['SUMX est toujours plus rapide','SUMX permet d\'évaluer une expression ligne par ligne avant de sommer — utile pour des calculs complexes','SUM ne fonctionne pas sur les colonnes calculées','SUMX ignore les filtres'],
ans:1,expl:'SUM(col) additionne une colonne directement. SUMX(table, expression) itère ligne par ligne, évalue l\'expression, puis somme. Ex : SUMX(ventes, ventes[qte] * RELATED(produits[prix])) pour un CA calculé ligne par ligne avec un prix issu d\'une table liée.'},

{id:35,cat:'DAX',level:'advanced',type:'code',
q:'Écris une mesure qui retourne le TOP 3 des produits par CA sous forme de texte concaténé.',
code:`Top 3 Produits =
VAR top3 =
    TOPN(
        3,
        ALL(dim_produit[nom_produit]),
        [CA Total],
        DESC
    )
RETURN
CONCATENATEX(
    top3,
    dim_produit[nom_produit],
    ", ",
    [CA Total],
    DESC
)`,
expl:'TOPN retourne les N premières lignes d\'une table selon un critère. CONCATENATEX itère sur une table et concatène les valeurs d\'une colonne avec un séparateur. Combo puissant pour des tooltips ou des cartes de synthèse.'},

// ─── MODÉLISATION ───
{id:36,cat:'Modélisation',level:'basic',type:'qcm',
q:'Qu\'est-ce qu\'un schéma en étoile (Star Schema) ?',
opts:['Une grande table unique','Une table de faits centrale reliée à plusieurs tables de dimensions dénormalisées','Des tables reliées en chaîne','Un schéma propre à SQL Server'],
ans:1,expl:'La table de faits contient les métriques mesurables (ventes, transactions). Les tables de dimension apportent le contexte (clients, produits, dates). C\'est le modèle recommandé pour Power BI et les data warehouses analytiques.'},

{id:37,cat:'Modélisation',level:'basic',type:'qcm',
q:'Quelle est la relation standard entre une table de faits et une table de dimension ?',
opts:['One-to-One','Many-to-One (faits → dimension)','One-to-Many (dimension → faits)','Many-to-Many'],
ans:1,expl:'Plusieurs lignes de faits peuvent pointer vers une même ligne de dimension (ex: plusieurs ventes pour un même client). Relation Many (faits) → One (dimension). Dans Power BI, la flèche de filtre va de la dimension vers les faits.'},

{id:38,cat:'Modélisation',level:'basic',type:'qcm',
q:'Qu\'est-ce qu\'une clé primaire et une clé étrangère ?',
opts:['Ce sont des index','Clé primaire : identifiant unique d\'une table. Clé étrangère : référence la clé primaire d\'une autre table pour créer une relation','Clé primaire = première colonne d\'une table','Clé étrangère = valeur chiffrée'],
ans:1,expl:'Clé primaire (PK) : identifie uniquement chaque ligne, valeur unique et non-nulle. Clé étrangère (FK) : référence la PK d\'une autre table, permet les jointures et garantit l\'intégrité référentielle.'},

{id:39,cat:'Modélisation',level:'inter',type:'qcm',
q:'Quelle est la différence entre schéma en étoile et schéma en flocon (Snowflake) ?',
opts:['Aucune différence pratique','Le flocon normalise les dimensions en sous-tables — plus économe en stockage mais plus de jointures et moins performant en BI','Le flocon est toujours préférable en Power BI','L\'étoile ne supporte pas les dates'],
ans:1,expl:'Flocon : dim_ville → dim_région → dim_pays (normalisé). Plus économe mais moins performant avec Vertipaq. Power BI préfère l\'étoile : dimensions dénormalisées, moins de jointures, meilleure compression.'},

{id:40,cat:'Modélisation',level:'inter',type:'open',
q:'Pourquoi est-il essentiel d\'avoir une table de dates dédiée dans Power BI ? Citez au moins 4 raisons.',
expl:'1. Active les fonctions Time Intelligence DAX (SAMEPERIODLASTYEAR, DATESYTD, DATEADD...)\n2. Garantit une continuité des dates sans trous (jours sans vente inclus dans l\'axe)\n3. Permet des hiérarchies personnalisées (semaine fiscale, trimestre décalé, numéro de semaine ISO)\n4. Améliore les performances : Vertipaq optimise les filtres sur une table de dates marquée\n5. Centralise toute la logique temporelle en un seul endroit\n6. Évite les ambiguïtés quand plusieurs tables ont des colonnes de dates (relations actives/inactives)'},

{id:41,cat:'Modélisation',level:'inter',type:'qcm',
q:'Qu\'est-ce que la cardinalité d\'une relation ?',
opts:['Le nombre de colonnes d\'une table','Le rapport entre le nombre de lignes correspondantes entre deux tables (1:1, 1:N, N:N)','La taille en Mo d\'une table','Le nombre de clés étrangères'],
ans:1,expl:'Cardinalité : 1:1 (un client = un contrat), 1:N (un client = plusieurs commandes), N:N (plusieurs produits dans plusieurs commandes). Impacts sur les performances des jointures et la logique de filtrage en DAX.'},

{id:42,cat:'Modélisation',level:'inter',type:'qcm',
q:'Qu\'est-ce qu\'une "dimension à évolution lente" (Slowly Changing Dimension) ?',
opts:['Une dimension qui ne change jamais','Une dimension dont les attributs peuvent changer dans le temps — plusieurs stratégies pour gérer l\'historique','Une dimension avec peu de lignes','Un type de table de faits'],
ans:1,expl:'SCD Type 1 : écrasement (pas d\'historique). SCD Type 2 : nouvelle ligne avec dates de validité (historique complet, table plus grande). SCD Type 3 : colonne "ancienne valeur" (historique limité). Ex : un client change de segment ou de région.'},

{id:43,cat:'Modélisation',level:'advanced',type:'open',
q:'Qu\'est-ce qu\'une relation Many-to-Many ? Donnez un exemple concret et expliquez comment la gérer proprement.',
expl:'Une relation N:N existe quand une ligne de A correspond à plusieurs de B, et vice-versa.\n\nExemple : un étudiant suit plusieurs cours, et un cours a plusieurs étudiants.\n\nGestion : introduire une table de jonction (bridge table) : etudiant_cours(id_etudiant, id_cours, date_inscription) qui transforme le N:N en deux relations 1:N.\n\nDans Power BI : la relation N:N native est supportée mais peut causer du double-comptage. La bridge table reste la meilleure pratique, surtout avec des filtres croisés et des mesures.'},

{id:44,cat:'Modélisation',level:'advanced',type:'qcm',
q:'Qu\'est-ce que la granularité d\'une table de faits et pourquoi est-elle critique ?',
opts:['Le nombre de colonnes','Le niveau de détail de chaque ligne — ce que représente exactement une ligne de la table','La taille de la table en lignes','Le nombre de dimensions liées'],
ans:1,expl:'Granularité fine (1 ligne = 1 transaction) : analyses très flexibles, volumes importants. Granularité grossière (1 ligne = total mensuel par produit) : moins flexible, plus compact. Une mauvaise granularité définie trop tard génère des refontes coûteuses.'},

{id:45,cat:'Modélisation',level:'advanced',type:'open',
q:'Expliquez la différence entre un Data Warehouse, un Data Lake et un Data Lakehouse. Quand utiliser chacun ?',
expl:'Data Warehouse : données structurées, schéma défini à l\'écriture (schema-on-write), optimisé pour les requêtes analytiques SQL. Ex: Snowflake, BigQuery, Redshift. Idéal pour le reporting et le BI.\n\nData Lake : données brutes de toute nature, schéma défini à la lecture (schema-on-read), très scalable et économique. Ex: S3, Azure Data Lake. Idéal pour le ML, l\'exploration, l\'archivage brut.\n\nData Lakehouse : hybride moderne qui combine le stockage économique du Lake avec les capacités analytiques du Warehouse. Ex: Delta Lake, Databricks, Apache Iceberg. Tendance dominante actuelle.\n\nEn pratique : Data Lake pour l\'ingestion brute → transformations → Data Warehouse pour l\'analytique métier.'},

{id:52,cat:'Python',level:'inter',type:'code',

{id:55,cat:'Python',level:'advanced',type:'code',
q:'Détecte les outliers dans une colonne "valeur" avec la méthode IQR et crée une colonne booléenne "is_outlier".',
code:`Q1 = df['valeur'].quantile(0.25)
Q3 = df['valeur'].quantile(0.75)
IQR = Q3 - Q1

borne_basse = Q1 - 1.5 * IQR
borne_haute = Q3 + 1.5 * IQR

df['is_outlier'] = (
    (df['valeur'] < borne_basse) |
    (df['valeur'] > borne_haute)
)

print(f"Outliers : {df['is_outlier'].sum()} "
      f"({df['is_outlier'].mean()*100:.1f}%)")`,
expl:'La méthode IQR est robuste aux distributions non normales. Seuil standard : 1.5 * IQR. Alternative : z-score pour distributions normales (|z| > 3). Créer une colonne booléenne permet de filtrer facilement ensuite.'},

{id:56,cat:'Python',level:'advanced',type:'qcm',
q:'Qu\'est-ce que la vectorisation dans pandas et pourquoi est-elle critique ?',

{id:57,cat:'Python',level:'advanced',type:'code',
q:'Calcule une moyenne mobile sur 7 jours pour une colonne "valeur" ordonnée par date.',
code:`df = df.sort_values('date')

{id:58,cat:'Théorie',level:'basic',type:'qcm',
q:'Qu\'est-ce qu\'un KPI ?',
opts:['Un type de graphique','Key Performance Indicator — métrique clé quantifiable pour mesurer la performance vs un objectif','Un format de fichier de données','Un langage de requête'],
ans:1,expl:'Un KPI est une métrique liée à un objectif précis. Il doit être SMART : Spécifique, Mesurable, Atteignable, Réaliste, Temporel. Ex: taux de conversion, CA mensuel, NPS, taux de churn.'},

{id:59,cat:'Théorie',level:'basic',type:'qcm',
q:'Qu\'est-ce que l\'ETL et comment diffère-t-il de l\'ELT ?',
opts:['Synonymes','ETL : transformer avant de charger (classique). ELT : charger brut puis transformer dans le warehouse (moderne)','ELT est toujours plus lent','ETL ne s\'utilise qu\'avec SQL'],
ans:1,expl:'ETL (classique) : Extract → Transform → Load. Transformation dans un outil externe avant chargement. ELT (moderne) : Extract → Load → Transform. On charge les données brutes dans le warehouse, puis on transforme avec SQL/dbt. ELT tire parti de la puissance de calcul des warehouses cloud.'},

{id:60,cat:'Théorie',level:'basic',type:'qcm',
q:'Quelle est la différence entre données structurées, semi-structurées et non structurées ?',
opts:['Aucune différence pratique','Structurées : schéma fixe (SQL, CSV). Semi-structurées : organisation partielle (JSON, XML). Non structurées : sans format (texte, image, vidéo)','Non structurées = données incorrectes','Structurées = uniquement des nombres'],
ans:1,expl:'Structurées (~20% des données mondiales) : facilement interrogeables. Semi-structurées : JSON, XML, logs. Non structurées (~80%) : emails, images, vidéos, PDFs. D\'où l\'essor du NLP, du ML et des data lakes.'},

{id:61,cat:'Théorie',level:'basic',type:'qcm',
q:'Qu\'est-ce qu\'un data pipeline ?',
opts:['Un type de graphique en cascade','Une séquence automatisée d\'étapes pour collecter, transformer et livrer des données d\'une source vers une destination','Un outil de visualisation','Un type de base de données'],
ans:1,expl:'Un pipeline de données orchestre : ingestion (API, BDD, fichiers) → transformation (nettoyage, enrichissement) → chargement (warehouse, lake) → disponibilité (BI, ML). Outils : Apache Airflow, dbt, Spark, Azure Data Factory.'},

{id:62,cat:'Théorie',level:'inter',type:'open',
q:'Qu\'est-ce que la qualité des données et ses 5 dimensions principales ?',
expl:'La qualité des données mesure l\'aptitude des données à satisfaire un usage.\n\n5 dimensions principales :\n1. Exactitude : les données reflètent fidèlement la réalité\n2. Complétude : absence de valeurs manquantes critiques\n3. Cohérence : même valeur dans différentes sources/tables\n4. Actualité : fraîcheur adaptée à l\'usage (données J-1 vs temps réel)\n5. Unicité : pas de doublons non souhaités\n\nMauvaise qualité → mauvaises décisions. Règle : "Garbage in, garbage out".'},

{id:63,cat:'Théorie',level:'inter',type:'qcm',
q:'Qu\'est-ce que la CSRD et quel impact a-t-elle sur les besoins en données des entreprises ?',
opts:['Un logiciel de comptabilité','Une directive EU obligeant les entreprises à publier un reporting de durabilité structuré (ESG), générant d\'importants besoins en données','Un standard de cybersécurité','Un format de fichier de données'],
ans:1,expl:'CSRD (Corporate Sustainability Reporting Directive) : oblige les entreprises EU (250+ salariés) à publier un reporting ESG détaillé selon les normes ESRS. Impact data : collecte des scopes 1/2/3 GES, indicateurs sociaux, gouvernance, format XBRL. Forte demande en Data Analysts spécialisés.'},

{id:64,cat:'Théorie',level:'inter',type:'open',
q:'Citez 3 types de biais dans les données et leurs conséquences sur l\'analyse.',
expl:'1. Biais de sélection : l\'échantillon ne représente pas la population réelle. Ex : analyser uniquement les clients actifs → surestimer la satisfaction, oublier les churned.\n\n2. Biais de confirmation : chercher des données qui confirment une hypothèse préexistante plutôt que de la tester. → Conclusions orientées, décisions biaisées.\n\n3. Biais de survivant : n\'analyser que les entités qui "ont survécu". Ex : étudier seulement les startups existantes pour comprendre le succès → ignorer les raisons d\'échec.\n\nConséquences : recommandations erronées, modèles ML discriminatoires, décisions stratégiques mal informées.'},

{id:65,cat:'Théorie',level:'inter',type:'qcm',
q:'Quelle est la différence entre corrélation et causalité ?',
opts:['Synonymes en statistique','La corrélation mesure une relation statistique entre deux variables. La causalité prouve qu\'une variable cause l\'autre','La causalité est plus facile à prouver','Une forte corrélation implique toujours la causalité'],
ans:1,expl:'Corrélation : deux variables varient ensemble (r entre -1 et 1). Causalité : l\'une provoque l\'autre. Ex célèbre : ventes de glaces et noyades sont corrélées (variable cachée : chaleur estivale). Prouver la causalité nécessite des A/B tests ou des méthodes économétriques (régression avec variables instrumentales).'},

{id:66,cat:'Théorie',level:'inter',type:'qcm',
q:'Qu\'est-ce qu\'un A/B test et quand l\'utiliser ?',
opts:['Un type de graphique','Une expérience contrôlée qui compare deux variantes (A et B) pour mesurer l\'impact causal d\'un changement','Un test de performance de base de données','Un test de qualité des données'],
ans:1,expl:'Un A/B test divise aléatoirement une population en deux groupes : groupe A (contrôle) et groupe B (variante). On mesure l\'impact de la variante sur une métrique cible. Prérequis : randomisation correcte, taille d\'échantillon suffisante, durée adéquate, une seule variable modifiée.'},

{id:67,cat:'Théorie',level:'advanced',type:'open',
q:'Expliquez la différence entre rapport, dashboard et analyse ad hoc. Quand utiliser chacun ?',
expl:'Rapport : document structuré, périodique, métriques fixes et prédéfinies. Destiné à des parties prenantes précises. Ex : rapport mensuel des ventes. → Quand : suivi régulier de KPIs stables.\n\nDashboard : interface interactive, mise à jour automatique, exploration autonome par les métiers. Ex : Power BI pour les managers. → Quand : monitoring en continu, self-service BI.\n\nAnalyse ad hoc : investigation ponctuelle pour répondre à une question spécifique non prévue. Flexible, non répétitive. Ex : comprendre une chute des ventes. → Quand : anomalie, décision stratégique urgente.\n\nErreur courante : créer un dashboard pour une question ponctuelle, ou faire une analyse ad hoc à répétition au lieu d\'automatiser.'},

{id:68,cat:'Théorie',level:'advanced',type:'qcm',
q:'Qu\'est-ce que le principe "Data Mesh" ?',
opts:['Un outil ETL','Une approche décentralisée où chaque domaine métier est responsable de ses propres données comme des "produits data"','Un type de schéma de base de données','Un standard de visualisation'],
ans:1,expl:'Data Mesh (Zhamak Dehghani, 2019) : 4 principes. 1) Ownership décentralisé par domaine. 2) Données comme produits (qualité, documentation, SLA). 3) Infrastructure self-serve partagée. 4) Gouvernance fédérée. Répond aux limites des data lakes/warehouses centralisés sur de grandes organisations.'},

{id:69,cat:'Théorie',level:'advanced',type:'open',
q:'Qu\'est-ce que la gouvernance des données (Data Governance) et pourquoi est-elle critique ?',
expl:'La gouvernance des données est l\'ensemble des politiques, processus et responsabilités qui garantissent la qualité, la sécurité et la conformité des données dans une organisation.\n\nComposantes clés :\n- Data Catalog : inventaire des données disponibles et leur définition\n- Data Lineage : traçabilité de l\'origine et des transformations des données\n- Data Stewardship : responsables désignés par domaine de données\n- Gestion des accès : qui peut voir et modifier quelles données\n- Conformité réglementaire : RGPD, CSRD, secteur financier...\n\nSans gouvernance : données contradictoires entre équipes, risques légaux, perte de confiance dans les analyses.'},

{id:70,cat:'Théorie',level:'advanced',type:'qcm',
q:'Qu\'est-ce que le RGPD et ses principales implications pour un Data Analyst ?',
opts:['Un outil de visualisation','Règlement Général sur la Protection des Données — encadre le traitement des données personnelles en EU et impose des obligations sur la collecte, le stockage et l\'analyse','Un format de base de données','Un standard de sécurité informatique'],
ans:1,expl:'RGPD : consentement requis, droit à l\'effacement, pseudonymisation des données sensibles, notification des violations. Pour un Data Analyst : ne jamais exposer les données personnelles brutes dans les rapports, anonymiser les exports, limiter la rétention des données, documenter les traitements dans le registre.'},

{id:76,cat:'SQL',level:'inter',type:'code',tables:['ventes','produits'],
q:'Retourne pour chaque catégorie de produit : le nombre de ventes, le CA total et le panier moyen.',
code:`SELECT
    p.categorie,
    COUNT(v.id_vente)           AS nb_ventes,
    SUM(v.quantite * v.prix_unitaire) AS ca_total,
    ROUND(
        SUM(v.quantite * v.prix_unitaire) / COUNT(v.id_vente),
        2
    )                           AS panier_moyen
FROM ventes v
INNER JOIN produits p ON p.id_produit = v.id_produit
GROUP BY p.categorie
ORDER BY ca_total DESC`,
expl:'On joint ventes et produits pour accéder à la catégorie. Le panier moyen = CA total / nombre de ventes. ROUND(x, 2) pour 2 décimales. GROUP BY sur la colonne de la dimension.'},

{id:77,cat:'SQL',level:'inter',type:'qcm',tables:['logs'],
q:'Que fait la fonction DENSE_RANK() et en quoi diffère-t-elle de RANK() ?',
opts:['Synonymes','RANK() laisse des trous dans la numérotation en cas d\'ex-aequo. DENSE_RANK() ne laisse pas de trous','DENSE_RANK() est plus lent','RANK() ne fonctionne pas avec PARTITION BY'],
ans:1,
expl:'Exemple avec scores 100, 100, 90 :\nRANK() → 1, 1, 3 (saute le rang 2)\nDENSE_RANK() → 1, 1, 2 (pas de trou)\nROW_NUMBER() → 1, 2, 3 (unique, arbitraire pour les ex-aequo)\nChoisir selon le besoin métier.'},

{id:78,cat:'SQL',level:'inter',type:'code',tables:['clients','commandes'],
q:'Trouve les clients qui n\'ont jamais passé de commande (utilise deux méthodes différentes).',
code:`-- Méthode 1 : LEFT JOIN + IS NULL
SELECT c.id_client, c.nom
FROM clients c
LEFT JOIN commandes o ON o.id_client = c.id_client
WHERE o.id_commande IS NULL

-- Méthode 2 : NOT EXISTS
SELECT c.id_client, c.nom
FROM clients c
WHERE NOT EXISTS (
    SELECT 1 FROM commandes o
    WHERE o.id_client = c.id_client
)

-- Méthode 3 : NOT IN (attention aux NULL)
SELECT id_client, nom
FROM clients
WHERE id_client NOT IN (
    SELECT DISTINCT id_client FROM commandes
    WHERE id_client IS NOT NULL
)`,
expl:'LEFT JOIN + IS NULL et NOT EXISTS sont généralement les plus performants. NOT IN est risqué si la sous-requête peut retourner des NULL (NULL IN liste = NULL, pas FALSE). NOT EXISTS est souvent préféré pour sa sécurité.'},

{id:79,cat:'SQL',level:'inter',type:'qcm',
q:'Qu\'est-ce qu\'une vue (VIEW) en SQL ?',
opts:['Une copie physique d\'une table','Une requête SQL sauvegardée et réutilisable comme une table virtuelle','Un type d\'index','Une procédure stockée'],
ans:1,
expl:'Une VIEW est une requête enregistrée qui se comporte comme une table. Elle ne stocke pas de données (sauf les vues matérialisées). Avantages : simplifier les requêtes complexes, masquer la complexité, contrôler les accès. CREATE VIEW ma_vue AS SELECT...'},

{id:80,cat:'SQL',level:'inter',type:'code',tables:['transactions'],
q:'Calcule pour chaque client la variation du montant entre chaque transaction et la précédente (delta).',
code:`SELECT
    id_client,
    id_transaction,
    date_transaction,
    montant,
    LAG(montant) OVER (
        PARTITION BY id_client
        ORDER BY date_transaction
    ) AS montant_precedent,
    montant - LAG(montant) OVER (
        PARTITION BY id_client
        ORDER BY date_transaction
    ) AS delta
FROM transactions
ORDER BY id_client, date_transaction`,
expl:'LAG() accède à la valeur de la ligne précédente dans la partition. La soustraction montant - LAG(montant) donne le delta. La première transaction de chaque client aura NULL comme montant_precedent et delta.'},

{id:81,cat:'SQL',level:'inter',type:'qcm',tables:['commandes'],
q:'Quelle est la différence entre une procédure stockée et une fonction en SQL ?',
opts:['Synonymes','Une procédure peut modifier des données et n\'a pas de valeur de retour obligatoire. Une fonction retourne une valeur et s\'utilise dans un SELECT','Les fonctions sont plus rapides','Les procédures ne peuvent pas avoir de paramètres'],
ans:1,
expl:'Procédure (PROCEDURE) : peut insérer/modifier/supprimer des données, pas de valeur de retour obligatoire, s\'appelle avec EXEC/CALL. Fonction (FUNCTION) : retourne une valeur scalaire ou une table, s\'utilise dans un SELECT, ne peut généralement pas modifier des données.'},

{id:82,cat:'SQL',level:'inter',type:'code',tables:['ventes','produits'],
q:'Retourne le produit le plus vendu (en quantité) par catégorie.',
code:`WITH ranked AS (
    SELECT
        p.categorie,
        p.nom_produit,
        SUM(v.quantite) AS total_quantite,
        RANK() OVER (
            PARTITION BY p.categorie
            ORDER BY SUM(v.quantite) DESC
        ) AS rk
    FROM ventes v
    INNER JOIN produits p ON p.id_produit = v.id_produit
    GROUP BY p.categorie, p.nom_produit
)
SELECT categorie, nom_produit, total_quantite
FROM ranked
WHERE rk = 1`,
expl:'Pattern classique : agrégation dans un CTE + window function pour le ranking + filtre WHERE rk = 1. RANK() plutôt que ROW_NUMBER() pour gérer les ex-aequo (deux produits à égalité seront tous les deux retournés).'},

// ─── SQL AVANCÉ (+7) ───
{id:83,cat:'SQL',level:'advanced',type:'qcm',
q:'Qu\'est-ce qu\'un plan d\'exécution (EXPLAIN) et pourquoi est-il utile ?',
opts:['Un commentaire dans le code SQL','Un rapport généré par le SGBD qui montre comment il va exécuter une requête — utile pour identifier les goulots d\'étranglement','Un type de procédure stockée','Un outil de visualisation'],
ans:1,
expl:'EXPLAIN (ou EXPLAIN ANALYZE sur PostgreSQL) affiche le plan d\'exécution : quels index sont utilisés, quelles jointures sont effectuées, combien de lignes sont estimées. Indispensable pour optimiser les requêtes lentes. Chercher les "Sequential Scan" sur de grandes tables — signe qu\'un index manque.'},

{id:84,cat:'SQL',level:'advanced',type:'code',tables:['commandes','clients'],
q:'Trouve les clients dont le montant total de commandes est supérieur à la moyenne de tous les clients.',
code:`WITH client_totals AS (
    SELECT
        id_client,
        SUM(montant) AS total
    FROM commandes
    GROUP BY id_client
),
avg_total AS (
    SELECT AVG(total) AS moyenne
    FROM client_totals
)
SELECT
    c.nom,
    ct.total,
    ROUND(ct.total - at.moyenne, 2) AS ecart_moyenne
FROM client_totals ct
CROSS JOIN avg_total at
INNER JOIN clients c ON c.id_client = ct.id_client
WHERE ct.total > at.moyenne
ORDER BY ct.total DESC`,
expl:'CROSS JOIN avec une table d\'une seule ligne (avg_total) permet d\'accéder à la moyenne globale sans sous-requête corrélée. L\'écart à la moyenne donne une information supplémentaire utile.'},

{id:85,cat:'SQL',level:'advanced',type:'qcm',
q:'Qu\'est-ce que la normalisation d\'une base de données et ses formes normales ?',
opts:['Un processus d\'optimisation des index','Un processus d\'organisation des données pour réduire la redondance et garantir l\'intégrité — 1NF, 2NF, 3NF sont les formes standard','Un type de sauvegarde','Un processus de compression'],
ans:1,
expl:'1NF : valeurs atomiques, pas de groupes répétés. 2NF : 1NF + chaque attribut dépend de toute la clé primaire. 3NF : 2NF + pas de dépendance transitive (A→B→C, B doit être dans sa propre table). En pratique, les data warehouses dénormalisent intentionnellement pour les performances analytiques.'},

{id:86,cat:'SQL',level:'advanced',type:'code',tables:['logs'],
q:'Analyse le funnel de conversion : pour chaque étape (view → click → purchase), calcule le nombre d\'utilisateurs et le taux de passage à l\'étape suivante.',
code:`WITH funnel AS (
    SELECT
        action,
        COUNT(DISTINCT user_id) AS nb_users
    FROM logs
    WHERE action IN ('view', 'click', 'purchase')
    GROUP BY action
),
ordered AS (
    SELECT
        action,
        nb_users,
        CASE action
            WHEN 'view' THEN 1
            WHEN 'click' THEN 2
            WHEN 'purchase' THEN 3
        END AS etape
    FROM funnel
)
SELECT
    etape,
    action,
    nb_users,
    ROUND(
        nb_users * 100.0 /
        FIRST_VALUE(nb_users) OVER (ORDER BY etape),
        1
    ) AS pct_vs_top
FROM ordered
ORDER BY etape`,
expl:'FIRST_VALUE() OVER retourne la valeur de la première ligne de la fenêtre — ici le nb_users de l\'étape 1 (view). Diviser chaque étape par cette valeur donne le taux de conversion cumulé depuis le début du funnel.'},

{id:87,cat:'SQL',level:'advanced',type:'qcm',
q:'Qu\'est-ce qu\'une transaction SQL et que signifie ACID ?',
opts:['Un type de requête SELECT','Un bloc d\'opérations traité comme une unité indivisible. ACID = Atomicité, Cohérence, Isolation, Durabilité','Un type de jointure','Un niveau d\'index'],
ans:1,
expl:'ACID garantit la fiabilité des transactions :\n- Atomicité : tout ou rien (COMMIT/ROLLBACK)\n- Cohérence : la BDD reste dans un état valide\n- Isolation : les transactions concurrentes ne s\'interfèrent pas\n- Durabilité : une transaction committée persiste même en cas de panne\nEssentiels pour les systèmes financiers et transactionnels.'},

{id:88,cat:'SQL',level:'advanced',type:'code',tables:['commandes'],
q:'Détecte les doublons dans la table commandes (même id_client, même montant, même date) et retourne uniquement les lignes en double.',
code:`WITH duplicates AS (
    SELECT
        id_client,
        montant,
        date_commande,
        COUNT(*) AS nb_occurrences,
        MIN(id_commande) AS premier_id
    FROM commandes
    GROUP BY id_client, montant, date_commande
    HAVING COUNT(*) > 1
)
SELECT c.*
FROM commandes c
INNER JOIN duplicates d
    ON  c.id_client = d.id_client
    AND c.montant = d.montant
    AND c.date_commande = d.date_commande
ORDER BY c.id_client, c.date_commande`,
expl:'Le CTE identifie les groupes avec plus d\'une occurrence. La jointure récupère toutes les lignes correspondantes. Pour ne garder qu\'un exemplaire et supprimer les doublons : DELETE avec ROW_NUMBER() WHERE rn > 1.'},

{id:89,cat:'SQL',level:'advanced',type:'qcm',
q:'Quelle est la différence entre OLTP et OLAP ?',
opts:['Synonymes','OLTP : optimisé pour les transactions courantes (INSERT/UPDATE rapides). OLAP : optimisé pour l\'analyse de grands volumes de données (agrégations, lectures)','OLAP est une version plus récente d\'OLTP','OLTP ne supporte pas les jointures'],
ans:1,
expl:'OLTP (Online Transaction Processing) : bases opérationnelles, normalisées, nombreuses petites transactions, ex: ERP, CRM. OLAP (Online Analytical Processing) : data warehouses, dénormalisés, grandes requêtes d\'agrégation, ex: Snowflake, BigQuery. Un Data Analyst travaille principalement avec des systèmes OLAP.'},

// ─── DAX INTERMEDIAIRE (+5) ───
{id:90,cat:'DAX',level:'inter',type:'qcm',
q:'Qu\'est-ce que RELATED() et RELATEDTABLE() en DAX ?',
opts:['Synonymes','RELATED() accède à une valeur d\'une table liée côté "one". RELATEDTABLE() retourne une table filtrée du côté "many"','RELATED() crée une nouvelle relation','RELATEDTABLE() ne fonctionne que dans les mesures'],
ans:1,
expl:'RELATED(dim_produit[categorie]) dans une colonne calculée de fact_ventes récupère la catégorie du produit lié. RELATEDTABLE(fact_ventes) dans une colonne de dim_client retourne toutes les ventes de ce client. RELATED = vers le "one", RELATEDTABLE = vers le "many".'},

{id:91,cat:'DAX',level:'inter',type:'code',

{id:92,cat:'DAX',level:'inter',type:'qcm',
q:'Qu\'est-ce que USERELATIONSHIP() et quand l\'utiliser ?',
opts:['Crée une nouvelle relation','Active une relation inactive pour le calcul d\'une mesure spécifique — utile quand plusieurs relations existent entre deux tables','Supprime une relation','Synonyme de RELATED()'],
ans:1,
expl:'Exemple : fact_ventes a deux relations avec dim_date (date_commande et date_livraison). Une seule peut être active. CALCULATE([CA], USERELATIONSHIP(fact_ventes[date_livraison], dim_date[date])) utilise temporairement la relation inactive pour calculer le CA par date de livraison.'},

{id:93,cat:'DAX',level:'inter',type:'code',
q:'Écris une mesure qui calcule le CA des N derniers jours, où N est défini par un slicer "Période" connecté à une table de paramètres.',
code:`-- Table de paramètres : dim_periode[nb_jours] (ex: 7, 30, 90)
CA Derniers N Jours =
VAR nb_jours = SELECTEDVALUE(dim_periode[nb_jours], 30)
VAR date_max = MAX(dim_date[date])
VAR date_min = date_max - nb_jours + 1
RETURN
CALCULATE(
    [CA Total],
    dim_date[date] >= date_min,
    dim_date[date] <= date_max
)`,
expl:'SELECTEDVALUE retourne la valeur sélectionnée dans un slicer (30 par défaut si rien n\'est sélectionné). Les variables VAR calculent les bornes de la période. Le CALCULATE filtre la table de dates sur cette plage.'},

{id:94,cat:'DAX',level:'inter',type:'qcm',
q:'Pourquoi éviter les colonnes calculées pour les métriques agrégées en DAX ?',
opts:['Les colonnes calculées sont interdites en DAX','Les colonnes calculées sont calculées ligne par ligne et stockées en mémoire — elles gonflent le modèle. Les mesures sont calculées à la demande et ne consomment pas de mémoire','Les colonnes calculées ne supportent pas SUM','Les mesures sont plus faciles à écrire'],
ans:1,
expl:'Une colonne calculée contenant SUM() retournerait le même total pour toutes les lignes (contexte de ligne, pas de filtre). Elle occupe de la RAM pour chaque ligne du modèle. Les agrégations doivent toujours être des mesures — elles respectent le contexte de filtre et ne consomment pas de mémoire au repos.'},

// ─── DAX AVANCÉ (+6) ───
{id:95,cat:'DAX',level:'advanced',type:'code',
q:'Écris une mesure qui calcule le CA des clients qui ont acheté pour la première fois ce mois-ci (nouveaux clients).',
code:`Nouveaux Clients CA =
VAR current_period = VALUES(dim_date[date])
RETURN
CALCULATE(
    [CA Total],
    FILTER(
        VALUES(fact_ventes[id_client]),
        VAR first_purchase =
            CALCULATE(
                MIN(fact_ventes[date_vente]),
                ALL(dim_date)
            )
        RETURN
        first_purchase IN current_period
    )
)`,
expl:'Pour chaque client, on calcule sa date de première commande toutes périodes confondues (ALL supprime le filtre date). Si cette première date est dans la période courante, le client est "nouveau". FILTER itère sur les clients distincts pour appliquer cette logique.'},

{id:96,cat:'DAX',level:'advanced',type:'qcm',
q:'Qu\'est-ce que KEEPFILTERS() et en quoi diffère-t-il du comportement standard de CALCULATE ?',
opts:['Synonyme de ALL()','CALCULATE remplace les filtres existants. KEEPFILTERS() ajoute le nouveau filtre en intersection avec les filtres existants plutôt qu\'en remplacement','KEEPFILTERS supprime tous les filtres','KEEPFILTERS est plus lent'],
ans:1,
expl:'CALCULATE([CA], dim_produit[categorie]="Électronique") remplace le filtre catégorie existant. CALCULATE([CA], KEEPFILTERS(dim_produit[categorie]="Électronique")) intersecte avec le filtre existant. Si un slicer a déjà filtré "Vêtements", KEEPFILTERS retournera BLANK() car l\'intersection est vide.'},

{id:97,cat:'DAX',level:'advanced',type:'code',
q:'Crée une mesure de cohort analysis : CA des clients acquis chaque mois, suivi mois par mois.',
code:`CA Cohorte =
VAR mois_acquisition =
    CALCULATE(
        MIN(dim_date[annee_mois]),
        ALL(dim_date),
        FILTER(
            VALUES(fact_ventes[id_client]),
            CALCULATE(MIN(fact_ventes[date_vente])) =
            MIN(fact_ventes[date_vente])
        )
    )
VAR mois_courant = SELECTEDVALUE(dim_date[annee_mois])
RETURN
IF(
    mois_courant >= mois_acquisition,
    [CA Total],
    BLANK()
)`,
expl:'La cohort analysis groupe les clients par mois d\'acquisition et suit leur comportement dans le temps. Cette mesure retourne le CA uniquement pour les mois postérieurs à l\'acquisition de la cohorte. Utilisée dans une matrice (cohorte en lignes, mois en colonnes).'},

{id:98,cat:'DAX',level:'advanced',type:'qcm',
q:'Qu\'est-ce que le principe de "measure branching" en DAX et pourquoi est-il une bonne pratique ?',
opts:['Un type de relation entre tables','Construire des mesures complexes en réutilisant des mesures simples — améliore la lisibilité, la maintenance et les performances','Un type de fonction DAX','Une technique d\'optimisation des colonnes calculées'],
ans:1,
expl:'Exemple : [CA Total] → [CA Last Year] → [Croissance %]. Chaque mesure s\'appuie sur la précédente. Avantages : modifier [CA Total] propage automatiquement les changements. Plus lisible que tout ré-écrire dans chaque mesure. Performances : DAX met en cache les mesures de base.'},

{id:99,cat:'DAX',level:'advanced',type:'code',

code:`P90 Montant Ventes =

{id:100,cat:'DAX',level:'advanced',type:'qcm',
q:'Comment optimiser les performances d\'un modèle Power BI qui est lent ?',
opts:['Ajouter plus de visuels','Réduire la cardinalité des colonnes, supprimer les colonnes inutiles, préférer les mesures aux colonnes calculées, éviter les relations bidirectionnelles et les filtres croisés non nécessaires','Augmenter le nombre de relations','Utiliser plus de colonnes calculées'],
ans:1,
expl:'Optimisation Vertipaq : 1) Supprimer les colonnes jamais utilisées 2) Réduire la cardinalité (ex: arrondir les montants à 2 décimales) 3) Éviter les relations bidirectionnelles (doublent le travail de filtrage) 4) Préférer les mesures 5) Utiliser DAX Studio + VertiPaq Analyzer pour identifier les colonnes lourdes.'},

// ─── MODÉLISATION (+10) ───
{id:101,cat:'Modélisation',level:'basic',type:'qcm',
q:'Qu\'est-ce qu\'une table de faits sans faits (Factless Fact Table) ?',
opts:['Une table de faits vide','Une table de faits qui enregistre des événements ou des couvertures sans métriques numériques — l\'existence de la ligne est elle-même le fait','Une erreur de modélisation','Une table de dimension'],
ans:1,
expl:'Ex : une table d\'inscriptions à des cours (id_etudiant, id_cours, date_inscription) sans métriques numériques. Le fait c\'est l\'inscription elle-même. Utile pour les analyses de présence, d\'éligibilité, de couverture promotionnelle.'},

{id:102,cat:'Modélisation',level:'basic',type:'qcm',
q:'Qu\'est-ce qu\'une clé de substitution (Surrogate Key) et pourquoi l\'utiliser ?',
opts:['La clé primaire naturelle du système source','Une clé artificielle générée par le data warehouse, indépendante du système source — garantit la stabilité même si les clés sources changent','Un type d\'index','Une clé composite'],
ans:1,
expl:'Les clés naturelles (ex: numéro client du CRM) peuvent changer, être réutilisées ou contenir des informations sensibles. La surrogate key (souvent un entier auto-incrémenté) est stable, anonyme et performante pour les jointures. Standard dans les data warehouses.'},

{id:103,cat:'Modélisation',level:'inter',type:'qcm',
q:'Qu\'est-ce qu\'une dimension conforme (Conformed Dimension) ?',
opts:['Une dimension sans NULL','Une dimension partagée entre plusieurs tables de faits et data marts — garantit la cohérence des analyses cross-sujets','Une dimension avec une seule colonne','Une dimension qui ne change jamais'],
ans:1,
expl:'Ex : dim_date partagée entre fact_ventes, fact_livraisons et fact_stocks. Permet de combiner les analyses : "ventes vs livraisons par mois" fonctionne car elles partagent la même dim_date. Sans dimension conforme, les analyses cross-sujets sont impossibles ou incohérentes.'},

{id:104,cat:'Modélisation',level:'inter',type:'qcm',
q:'Quelle est la différence entre un data mart et un data warehouse ?',
opts:['Synonymes','Un data warehouse couvre toute l\'entreprise. Un data mart est un sous-ensemble orienté vers un département ou un sujet spécifique','Un data mart est toujours plus grand','Un data warehouse ne supporte pas SQL'],
ans:1,
expl:'Data Warehouse (DW) : source unique de vérité pour toute l\'organisation, intègre toutes les données. Data Mart : vue spécialisée pour un département (ventes, finance, RH), souvent construite sur le DW. Les data marts facilitent l\'accès aux données pour des utilisateurs métiers spécifiques.'},

{id:105,cat:'Modélisation',level:'inter',type:'open',
q:'Expliquez les différentes stratégies de chargement de données (Full Load vs Incremental Load). Quand utiliser chacune ?',
expl:'Full Load (chargement complet) : supprime et recharge toutes les données à chaque exécution. Simple à implémenter, garantit la cohérence. Problème : lent et coûteux sur de grands volumes.\n\nIncremental Load (chargement incrémental) : ne charge que les données nouvelles ou modifiées depuis le dernier chargement. Nécessite une colonne de timestamp ou un mécanisme de change data capture (CDC). Beaucoup plus performant sur de grands volumes.\n\nUpsert (Insert + Update) : insère les nouvelles lignes et met à jour les existantes. Pattern MERGE en SQL.\n\nChoix : Full Load pour les petites tables de référence. Incremental pour les grandes tables de faits.'},

{id:106,cat:'Modélisation',level:'inter',type:'qcm',
q:'Qu\'est-ce que le Change Data Capture (CDC) ?',
opts:['Un type de sauvegarde','Un mécanisme qui capture automatiquement les insertions, modifications et suppressions dans une base source pour les propager vers le data warehouse','Un type de contrainte SQL','Un outil de visualisation'],
ans:1,
expl:'Le CDC lit les logs de transaction de la base source pour détecter les changements en temps quasi-réel, sans impact sur les performances de la source. Méthodes : lecture des logs binaires (Debezium), triggers, colonnes updated_at. Essentiel pour les pipelines de streaming et les data warehouses à faible latence.'},

{id:107,cat:'Modélisation',level:'advanced',type:'open',
q:'Qu\'est-ce que dbt (data build tool) et quel problème résout-il ?',
expl:'dbt est un outil de transformation de données qui applique les bonnes pratiques du développement logiciel au data engineering.\n\nProblème résolu : les transformations SQL étaient souvent des scripts non versionnés, non testés, difficiles à maintenir.\n\ndbt apporte :\n- Modularité : les transformations SQL sont organisées en modèles réutilisables\n- Tests automatiques : vérification de la qualité des données (unicité, non-null, valeurs attendues)\n- Documentation : générée automatiquement depuis le code\n- Lineage : visualisation des dépendances entre modèles\n- Versioning : compatible Git\n\nPattern : dbt s\'occupe du T de l\'ELT. Les données sont déjà dans le warehouse, dbt les transforme en SQL.'},

{id:108,cat:'Modélisation',level:'advanced',type:'qcm',
q:'Qu\'est-ce que le principe de "Single Source of Truth" (SSOT) ?',
opts:['Un type de base de données','Le principe selon lequel chaque donnée a une source canonique unique et authoritative — évite les incohérences entre systèmes','Un outil de gouvernance','Un type de backup'],
ans:1,
expl:'Sans SSOT : le CA dans le CRM diffère du CA dans l\'ERP diffère du CA dans Excel du commercial. Avec SSOT : le data warehouse est la référence unique, tous les rapports s\'y connectent. Implique une gouvernance forte : définitions communes des métriques, processus de certification des données.'},

{id:109,cat:'Modélisation',level:'advanced',type:'qcm',
q:'Qu\'est-ce qu\'Apache Spark et quand l\'utiliser vs SQL classique ?',
opts:['Un outil de visualisation','Un framework de traitement distribué en mémoire — utile pour les volumes massifs (Big Data) que SQL classique ne peut pas traiter efficacement','Un type de base de données relationnelle','Un concurrent de Power BI'],
ans:1,
expl:'Spark traite les données en parallèle sur un cluster de machines. Utiliser Spark quand : volumes en téraoctets+, transformations complexes (ML, NLP), données non structurées, streaming. SQL classique suffit pour la plupart des analyses BI sur des warehouses cloud modernes (BigQuery, Snowflake gèrent plusieurs téraoctets efficacement).'},

{id:110,cat:'Modélisation',level:'advanced',type:'open',
q:'Expliquez les concepts de partitionnement et de clustering dans un data warehouse cloud (ex: BigQuery). Pourquoi sont-ils importants ?',
expl:'Partitionnement : divise une table en segments selon une colonne (souvent la date). Une requête avec WHERE date = "2024-01-01" ne scanne que la partition de ce jour, pas toute la table. Réduit drastiquement les coûts et améliore les performances.\n\nClustering : organise les données au sein d\'une partition selon les valeurs de colonnes choisies (ex: categorie, region). Les données similaires sont physiquement proches — les filtres et agrégations sur ces colonnes sont plus rapides.\n\nBonne pratique BigQuery : partitionner par date d\'ingestion ou date métier + clusterer par les colonnes les plus filtrées. Peut réduire les coûts de 90%+ sur de grands volumes.'},

// ─── PYTHON (+13) ───
{id:111,cat:'Python',level:'basic',type:'qcm',
q:'Comment supprimer les doublons dans un DataFrame pandas ?',
opts:['df.remove_duplicates()','df.drop_duplicates()','df.unique()','df.deduplicate()'],
ans:1,
expl:'df.drop_duplicates() supprime les lignes entièrement dupliquées. df.drop_duplicates(subset=["col1","col2"]) considère uniquement ces colonnes. df.drop_duplicates(keep="last") garde la dernière occurrence. df.duplicated() retourne un masque booléen des doublons.'},

{id:112,cat:'Python',level:'basic',type:'code',
q:'Filtre un DataFrame pour ne garder que les lignes où la colonne "age" est entre 25 et 45 ans (inclus).',
code:`# Méthode 1 — conditions booléennes
df_filtered = df[(df['age'] >= 25) & (df['age'] <= 45)]

# Méthode 2 — between (inclusif des deux bornes)
df_filtered = df[df['age'].between(25, 45)]

# Méthode 3 — query (plus lisible)
df_filtered = df.query('25 <= age <= 45')`,
expl:'between(a, b) est inclusif des deux bornes par défaut. query() accepte une expression Python en chaîne — très lisible. Attention avec les conditions booléennes : utiliser & (et) et | (ou), jamais and/or Python (ils opèrent sur des scalaires).'},

{id:113,cat:'Python',level:'basic',type:'qcm',
q:'Comment convertir une colonne de chaînes en type datetime dans pandas ?',
opts:['df["date"].to_datetime()','pd.to_datetime(df["date"])','df["date"].astype("datetime")','df["date"].parse_dates()'],
ans:1,
expl:'pd.to_datetime(df["col"], format="%Y-%m-%d") convertit les chaînes en datetime. Le paramètre format accélère la conversion sur de grands volumes. errors="coerce" transforme les valeurs invalides en NaT plutôt que de lever une erreur.'},

{id:114,cat:'Python',level:'inter',type:'code',
q:'Calcule la moyenne mobile sur 30 jours et l\'écart-type mobile sur 30 jours pour détecter les anomalies (méthode z-score).',
code:`df = df.sort_values('date').set_index('date')

df['ma_30'] = df['valeur'].rolling(30, min_periods=1).mean()
df['std_30'] = df['valeur'].rolling(30, min_periods=1).std()

df['z_score'] = (df['valeur'] - df['ma_30']) / df['std_30']
df['anomalie'] = df['z_score'].abs() > 3

print(f"Anomalies détectées : {df['anomalie'].sum()}")`,
expl:'Le z-score mesure le nombre d\'écarts-types entre une valeur et la moyenne. |z| > 3 = outlier (règle des 3 sigma). Rolling sur 30 jours donne un contexte local plutôt que global. min_periods=1 évite les NaN au début de la série.'},

{id:115,cat:'Python',level:'inter',type:'qcm',
q:'Qu\'est-ce qu\'un générateur (generator) en Python et quel avantage a-t-il sur une liste ?',
opts:['Synonyme de liste','Un objet itérable qui génère les valeurs à la demande (lazy evaluation) — consomme beaucoup moins de mémoire qu\'une liste pour de grands volumes','Un type de boucle','Un décorateur de fonction'],
ans:1,

{id:118,cat:'Python',level:'inter',type:'code',
q:'Crée une fonction Python qui nettoie un DataFrame : supprime les doublons, remplace les NULL numériques par la médiane et les NULL textuels par "Inconnu".',
code:`def clean_dataframe(df):
    # Suppression des doublons
    df = df.drop_duplicates()

    for col in df.columns:
        if df[col].dtype in ['int64', 'float64']:
            # Remplacement NULL numériques par la médiane
            median = df[col].median()
            df[col] = df[col].fillna(median)
        elif df[col].dtype == 'object':
            # Remplacement NULL textuels
            df[col] = df[col].fillna('Inconnu')

    return df

df_clean = clean_dataframe(df.copy())
print(f"Lignes avant : {len(df)}, après : {len(df_clean)}")`,
expl:'df.copy() évite de modifier le DataFrame original. fillna() remplace les NaN. La médiane est plus robuste que la moyenne pour les distributions asymétriques ou avec outliers. Toujours documenter les choix d\'imputation.'},

{id:119,cat:'Python',level:'advanced',type:'code',
q:'Crée un pipeline de traitement de données avec scikit-learn pour normaliser les features numériques et encoder les features catégorielles.',
code:`from sklearn.pipeline import Pipeline
from sklearn.preprocessing import StandardScaler, OneHotEncoder
from sklearn.compose import ColumnTransformer
import pandas as pd

numeric_features = ['age', 'salaire', 'anciennete']
categorical_features = ['departement', 'poste']

preprocessor = ColumnTransformer(transformers=[
    ('num', StandardScaler(), numeric_features),
    ('cat', OneHotEncoder(drop='first', sparse_output=False),
     categorical_features)
])

pipeline = Pipeline(steps=[
    ('preprocessor', preprocessor)
])

X_train_processed = pipeline.fit_transform(X_train)
X_test_processed = pipeline.transform(X_test)`,
expl:'ColumnTransformer applique différentes transformations selon le type de colonne. StandardScaler normalise (moyenne=0, std=1). OneHotEncoder crée des variables dummy. Pipeline garantit qu\'on applique exactement les mêmes transformations sur train et test (pas de data leakage).'},

{id:120,cat:'Python',level:'advanced',type:'qcm',
q:'Qu\'est-ce que le "data leakage" en machine learning et comment l\'éviter ?',
opts:['Une fuite de données personnelles','L\'utilisation d\'informations du jeu de test lors de l\'entraînement — conduit à des performances artificiellement élevées qui ne se reproduisent pas en production','Un type de bug mémoire','Une erreur de syntaxe'],
ans:1,
expl:'Exemples de leakage : normaliser sur tout le dataset avant le split train/test (la moyenne intègre les données de test), inclure des features qui ne seraient pas disponibles en production. Solution : toujours fit() sur le train seulement, transform() sur train et test. Utiliser des pipelines sklearn pour éviter les erreurs.'},

{id:121,cat:'Python',level:'advanced',type:'code',
q:'Écris une fonction pour calculer et visualiser la matrice de corrélation d\'un DataFrame avec un heatmap.',
code:`import pandas as pd
import matplotlib.pyplot as plt
import seaborn as sns

def plot_correlation_matrix(df, threshold=0.7):
    # Calcul de la corrélation
    corr = df.select_dtypes(include='number').corr()

    # Masque pour le triangle supérieur
    import numpy as np
    mask = np.triu(np.ones_like(corr, dtype=bool))

    fig, ax = plt.subplots(figsize=(10, 8))
    sns.heatmap(
        corr,
        mask=mask,
        annot=True,
        fmt='.2f',
        cmap='RdYlGn',
        center=0,
        vmin=-1, vmax=1,
        ax=ax
    )
    ax.set_title('Matrice de corrélation')
    plt.tight_layout()
    plt.show()

    # Corrélations fortes
    strong = [(c1, c2, corr.loc[c1,c2])
              for c1 in corr.columns
              for c2 in corr.columns
              if c1 < c2 and abs(corr.loc[c1,c2]) > threshold]
    return strong

plot_correlation_matrix(df)`,
expl:'Le masque triangle supérieur évite la redondance. annot=True affiche les valeurs. cmap="RdYlGn" : rouge pour corrélations négatives, vert pour positives. Les corrélations > 0.7 entre features indiquent une multicolinéarité potentiellement problématique pour les modèles ML.'},

{id:122,cat:'Python',level:'advanced',type:'qcm',
q:'Qu\'est-ce que la décoration (decorator) en Python et donnez un exemple d\'usage en data engineering ?',

ans:1,
expl:'@timer mesure le temps d\'exécution d\'une fonction. @retry(max_attempts=3) relance automatiquement en cas d\'erreur réseau. @log_execution enregistre les paramètres et résultats. En data engineering : décorer les fonctions d\'ingestion pour le monitoring et la résilience sans polluer le code métier.'},

{id:123,cat:'Python',level:'advanced',type:'code',
q:'Écris un décorateur Python qui mesure et affiche le temps d\'exécution d\'une fonction.',
code:`import time
from functools import wraps

def timer(func):
    @wraps(func)
    def wrapper(*args, **kwargs):
        start = time.perf_counter()
        result = func(*args, **kwargs)
        elapsed = time.perf_counter() - start
        print(f"{func.__name__} exécuté en {elapsed:.3f}s")
        return result
    return wrapper

@timer
def process_data(df):
    return df.groupby('categorie')['montant'].sum()

result = process_data(df)
# Output: process_data exécuté en 0.042s`,
expl:'@wraps(func) préserve le nom et la docstring de la fonction originale. perf_counter() est plus précis que time(). *args, **kwargs transmettent tous les arguments. Pattern très utilisé en data engineering pour le monitoring des performances.'},

{id:126,cat:'Théorie',level:'basic',type:'qcm',

{id:127,cat:'Théorie',level:'basic',type:'qcm',
q:'Qu\'est-ce que le Machine Learning supervisé vs non supervisé ?',
opts:['Synonymes','Supervisé : apprend depuis des données labellisées (classification, régression). Non supervisé : trouve des patterns sans labels (clustering, réduction de dimension)','Non supervisé est toujours plus précis','Supervisé ne nécessite pas de données'],
ans:1,
expl:'Supervisé : classification (spam/non-spam), régression (prédiction de prix). Non supervisé : clustering (segmentation clients avec K-Means), réduction de dimension (PCA). Semi-supervisé : mélange des deux. En tant que Data Analyst, comprendre ces concepts aide à collaborer avec les Data Scientists.'},

{id:128,cat:'Théorie',level:'inter',type:'qcm',
q:'Qu\'est-ce que le taux de churn et comment le calculer ?',

ans:1,
expl:'Churn mensuel = (clients début - clients fin) / clients début × 100. Ex : 1000 clients en janvier, 950 en février = 5% de churn. Le churn est un KPI critique pour les entreprises SaaS et d\'abonnement. Son inverse : le taux de rétention = 100% - churn%.'},

{id:129,cat:'Théorie',level:'inter',type:'qcm',

ans:1,
